services:
  app-shell-testing:
    image: ratel/app-shell:${COMMIT}
    restart: always
    environment:
      IP: "0.0.0.0"
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "apt update && apt install curl -y && curl -f http://localhost:8080 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 100
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    networks:
      - ratel-network
    profiles:
      - testing

  app-shell:
    image: rust
    restart: always
    ports:
      - "8080:8080"
    environment:
      ENV: local
      PORT: 8080
      WEB_BUILD: "ignore"
      RUST_LOG: ${RUST_LOG:-debug}
      RUST_FLAG: ${RUST_FLAG:---features bypass}
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DYNAMO_TABLE_PREFIX: ${DYNAMO_TABLE_PREFIX:-ratel-local}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-dummy}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY:-dummy}
      BINANCE_WEBHOOK: ${BINANCE_WEBHOOK:-dummy}
      REDIRECT_DOMAIN: ${REDIRECT_DOMAIN:-http://localhost:3000}
      SLACK_HOOK: ${SLACK_HOOK}

      PORTONE_STORE_ID: ${PORTONE_STORE_ID}
      PORTONE_INICIS_CHANNEL_KEY: ${PORTONE_INICIS_CHANNEL_KEY}
      PORTONE_KPN_CHANNEL_KEY: ${PORTONE_KPN_CHANNEL_KEY}
      PORTONE_API_SECRET: ${PORTONE_API_SECRET}
      PORTONE_WEBHOOK_SECRET: ${PORTONE_WEBHOOK_SECRET}

      # Environments for frontend
      RPC_URL: "https://public-en-kairos.node.kaia.io"
      BLOCK_EXPLORER_URL: "https://kairos.kaiascan.io"
      USDT_ADDRESS: "0xd077a400968890eacc75cdc901f0356c943e4fdb"
      OPERATOR_ADDRESS: ${OPERATOR_ADDRESS:-dummy}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-dummy}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-dummy}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-dummy}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-dummy}
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID:-dummy}
      FIREBASE_APP_ID: ${FIREBASE_APP_ID:-dummy}
      FIREBASE_MEASUREMENT_ID: ${FIREBASE_MEASUREMENT_ID:-dummy}

      BEDROCK_AGENT_ID: ${BEDROCK_AGENT_ID}
      BEDROCK_AGENT_ALIAS_ID: ${BEDROCK_AGENT_ALIAS_ID}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

    volumes:
      - cargo-target:/app-target
      - node_modules:/app/node_modules
      - comp-node_modules:/app/ts-packages/components/node_modules
      - web-node_modules:/app/ts-packages/web/node_modules
      - .:/app

    working_dir: /app
    command: ["bash", "scripts/api-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 100
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    networks:
      - ratel-network
    profiles:
      - development

  # Development fetcher (source code mounting)
  localstack:
    hostname: localstack
    image: localstack/localstack
    restart: always
    ports:
      - "4566:4566"
    environment:
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE:-1}
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: ${LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT:-1}
      SERVICES: dynamodb,s3,sqs
      DYNAMODB_SHARE_DB: 1
      SQS_ENDPOINT_STRATEGY: "off"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    volumes:
      - ./.build/localstack-data:/var/lib/localstack
    networks:
      - ratel-network
    profiles:
      - testing
      - development
      - infra

  # DynamoDB initialization
  localstack-init:
    image: amazonlinux:2023
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      LOCALSTACK_ENDPOINT: http://localstack:4566
      RESET_DB: ${RESET_DB:-false}
    volumes:
      - ./scripts:/scripts
    networks:
      - ratel-network
    command: ["bash", "/scripts/localstack-init-entrypoint.sh"]
    depends_on:
      localstack:
        condition: service_healthy
    profiles:
      - testing
      - development
      - infra

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    restart: always
    ports:
      - "8081:8001"
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      - localstack-init
    profiles:
      - development
      - infra
      - testing
    networks:
      - ratel-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
    cpus: 2
    mem_limit: 8192m
    profiles:
      - development
      - infra
      - testing
    networks:
      - ratel-network

  qdrant-init:
    image: amazonlinux:2023
    environment:
      ENDPOINT: http://qdrant:6333
      COLLECTION: ratel-local-posts
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: ["bash", "/scripts/qdrant-init-entrypoint.sh"]
    profiles:
      - development
      - infra
      - testing
    networks:
      - ratel-network

volumes:
  node_modules:
  comp-node_modules:
  web-node_modules:
  cargo-target:

networks:
  ratel-network:
    driver: bridge
