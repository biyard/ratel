# Scenario 4: Error page → Go Home recovery
# Tests that the "Go home" button works after a session error.
# We force an error by navigating to a protected route while logged out.
appId: co.biyard.ratel
---
- launchApp:
    clearState: true

- waitForAnimationToEnd

# Navigate to a route that requires auth (drafts)
- tapOn: "Drafts"

# If not logged in, should see login modal or error page
# The exact behavior depends on server state; we test whichever appears
- extendedWaitUntil:
    visible:
      anyOf:
        - "Go home"
        - "Sign In"
        - "Drafts"
    timeout: 10000

- takeScreenshot: 04-error-or-login-state
