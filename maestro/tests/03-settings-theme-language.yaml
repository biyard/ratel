# Scenario 3: Change theme and language in settings
# Depends on: 01-login (user signed in on home)
appId: co.biyard.ratel
---
- launchApp

- waitForAnimationToEnd

# Open settings panel
- tapOn: "Settings"

# Settings panel should be visible
- assertVisible: "Theme"
- assertVisible: "Language"

# Switch theme to Light
- tapOn: "Light"
- takeScreenshot: 03-theme-light

# Switch theme back to Dark
- tapOn: "Dark"
- takeScreenshot: 03-theme-dark

# Switch language to Korean
- tapOn: "KO"
- extendedWaitUntil:
    visible: "테마"
    timeout: 5000
- takeScreenshot: 03-lang-korean

# Switch back to English
- tapOn: "EN"
- extendedWaitUntil:
    visible: "Theme"
    timeout: 5000

# Close settings
- tapOn: "Close settings"
