[package]
name = "ratel-auth"
version = "0.1.0"
authors = ["hackartists <hackartists@gmail.com>"]
edition = "2021"

[dependencies]
dioxus = { workspace = true }
common = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }

# Server-only dependencies
bdk = { workspace = true, optional = true }
serde_dynamo = { workspace = true, optional = true }
percent-encoding = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
sha3 = { version = "0.10", optional = true }
hex = { version = "0.4", optional = true }
sha2 = { version = "0.10", optional = true }
base64 = { workspace = true, optional = true }
rand = { version = "0.9", optional = true }
uuid = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
hmac = { version = "0.12", optional = true }
tower-sessions = { version = "0.15.0", optional = true }
tracing = { workspace = true, optional = true }
url = { version = "2", optional = true }
validator = { version = "0.19", features = ["derive"], optional = true }
regex = { version = "1", optional = true }
aws-sdk-sesv2 = { version = "1", optional = true }
aws-sdk-sns = { version = "1", optional = true }
aws-sdk-dynamodb = { workspace = true, optional = true }

[features]
default = ["web"]
web = ["common/web", "dioxus/web"]
server = [
    "common/server",
    "dioxus/server",
    "bdk/be",
    "serde_dynamo",
    "percent-encoding",
    "reqwest",
    "tokio",
    "sha3",
    "hex",
    "sha2",
    "base64",
    "rand",
    "uuid",
    "chrono",
    "hmac",
    "tower-sessions",
    "tracing",
    "url",
    "validator",
    "regex",
    "aws-sdk-sesv2",
    "aws-sdk-sns",
    "aws-sdk-dynamodb",
]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
bypass = []
