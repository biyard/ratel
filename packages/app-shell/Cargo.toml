[package]
name = "app-shell"
version = "0.1.0"
authors = ["hackartists <hackartists@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
common = { workspace = true }
dioxus = { workspace = true }
ratel-auth = { workspace = true, optional = true }
ratel-post = { workspace = true, optional = true }
space-shell = { workspace = true, optional = true }

web-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
serde-wasm-bindgen = { workspace = true }


[features]
default = []
bypass = ["ratel-auth?/bypass"]
web = ["common/web", "ratel-auth/web", "space-shell/web", "ratel-post/web"]
desktop = ["common/desktop","ratel-auth/desktop", "space-shell/desktop", "ratel-post/desktop"]
mobile = ["common/mobile","ratel-auth/mobile", "space-shell/mobile", "ratel-post/mobile"]
server = ["common/server", "ratel-auth/server", "space-shell/server", "ratel-post/server"]
