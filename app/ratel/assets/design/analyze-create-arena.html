      background: rgba(34, 197, 94, 0.10);
      border-color: rgba(34, 197, 94, 0.32);
      color: #22c55e;
    }
    .builder-step-btn__num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      font-size: 10px;
    }
    .builder-step-arrow { color: var(--text-dim); font-size: 14px; }

    /* Step content panels (only the active one shows) */
    .builder-step-content { display: none; flex-direction: column; gap: 14px; }
    .builder-step-content[data-active="true"] { display: flex; }

    .builder-label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--analyze-color);
    }
    .builder-name-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700;
      outline: none; transition: all 0.15s;
    }
    .builder-name-input:focus {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .builder-hint {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* Inline callout (info banner inside wizard step) */
    .builder-callout {
      display: flex; gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--analyze-bg);
      border: 1px solid var(--analyze-border);
      color: var(--analyze-color);
      font-size: 12px; line-height: 1.5;
    }
    .builder-callout svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
    .builder-callout strong { color: var(--text-primary); }

    /* Snapshot grid (used in step 2 + result) */
    .snap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .snap-card {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      transition: all 0.15s;
      min-height: 160px;
    }
    .snap-card:hover { border-color: var(--analyze-border); }
    .snap-card__head {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .snap-card__name {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary); line-height: 1.3;
      flex: 1; min-width: 0;
      word-break: break-word;
    }
    .snap-card__time {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .snap-card__chips {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .snap-card__chip {
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 10px; font-weight: 600;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snap-card__chip[data-source="poll"]       { background: var(--poll-bg);       color: var(--poll-color);       border-color: var(--poll-border); }
    .snap-card__chip[data-source="quiz"]       { background: var(--quiz-bg);       color: var(--quiz-color);       border-color: var(--quiz-border); }
    .snap-card__chip[data-source="discussion"] { background: var(--discussion-bg); color: var(--discussion-color); border-color: var(--discussion-border); }
    .snap-card__chip--more {
      background: transparent;
      color: var(--text-dim);
      border-style: dashed;
    }
    .snap-card__pseudo {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--analyze-color);
    }
    .snap-card__actions {
      display: flex; gap: 6px; margin-top: auto;
    }
    .snap-card__btn {
      flex: 1;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .snap-card__btn--restore:hover { border-color: var(--analyze-border); color: var(--analyze-color); }
    .snap-card__btn--delete:hover  { border-color: rgba(239,68,68,0.4); color: var(--accent-red); }

    /* "+" new-snapshot card — same dashed gold pattern as builder-empty */
    .snap-card--new {
      cursor: pointer;
      background: linear-gradient(180deg, rgba(252,179,0,0.06), rgba(252,179,0,0.02));
      border: 2px dashed var(--analyze-border);
      align-items: center; justify-content: center;
      text-align: center;
      gap: 10px;
      font-family: inherit;
      color: inherit;
    }
    .snap-card--new:hover {
      border-color: var(--accent-gold);
      background: linear-gradient(180deg, rgba(252,179,0,0.14), rgba(252,179,0,0.04));
      transform: translateY(-1px);
    }
    .snap-card--new__icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent-gold);
      color: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; line-height: 1;
      box-shadow: 0 2px 12px rgba(252,179,0,0.35);
    }
    .snap-card--new__title {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }
    .snap-card--new__desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      max-width: 180px;
    }

    /* Wizard footer actions */
    /* ── PREVIEW slide-in detail drawer ───────────────────
       Right-anchored overlay opened by clicking a preview-stat
       tile. Backdrop dims the arena; clicking it (or the close
       button) closes the drawer. */
    .detail-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(420px, 92vw);
      z-index: 60;
      background: var(--panel-bg);
      border-left: 1px solid var(--border-subtle);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.35);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex; flex-direction: column;
    }
    .detail-drawer[data-open="true"] {
      transform: translateX(0);
    }
    .detail-drawer__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .detail-drawer__title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--text-primary);
    }
    .detail-drawer__close {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .detail-drawer__close:hover { color: var(--text-primary); border-color: var(--border-strong); }
    .detail-drawer__close svg { width: 16px; height: 16px; }
    .detail-drawer__body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 32px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .detail-drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 55;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    /* Drawer body section — one per filter chip in raw-data view. */
    .dd-section {
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .dd-section:last-child { border-bottom: none; }
    .dd-section__head {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .dd-section__title {
      flex: 1; min-width: 0;
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .dd-section__count {
      flex-shrink: 0;
      padding: 2px 8px; border-radius: 100px;
      background: var(--analyze-bg);
      border: 1px solid var(--analyze-border);
      color: var(--analyze-color);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em;
    }
    .dd-section__list {
      display: flex; flex-direction: column; gap: 6px;
    }

    /* Drawer body cell variants. */
    .dd-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }
    .dd-row__avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-hover);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
    }
    .dd-row__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dd-row__title {
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dd-row__meta {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .dd-row__chip {
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dd-row__chip[data-source="poll"]       { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .dd-row__chip[data-source="quiz"]       { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .dd-row__chip[data-source="discussion"] { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .dd-row__chip[data-source="follow"]     { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }

    /* Preview-stat is now a clickable button. */
    .preview-stat {
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-align: left;
    }
    .preview-stat:hover {
      transform: translateY(-1px);
      border-color: var(--analyze-border);
    }
    .preview-stat__hint {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--analyze-color);
      margin-top: 4px;
    }

    /* Wizard footer — pinned to the viewport bottom in CREATE/PREVIEW.
       MUST live as a direct child of .arena (NOT inside .builder-create)
       because .builder-create has backdrop-filter:blur, which would
       otherwise become the containing block for fixed descendants. */
    .builder-actions {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      display: none;
      align-items: center; justify-content: space-between;
      gap: 10px;
      padding: 14px 28px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle);
    }
    /* Visibility driven by body[data-mode] (synced in setMode). */
    body[data-mode="create"]  .builder-actions--create  { display: flex; }
    body[data-mode="preview"] .builder-actions--preview { display: flex; }
    .builder-actions__step {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .builder-actions__group { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 600px) {
      .builder-actions { padding: 12px 14px; }
    }
    /* Reserve scroll-padding so the cards aren't hidden behind the
       fixed footer when scrolled to the bottom. */
    .split[data-mode="create"],
    .split[data-mode="preview"] {
      padding-bottom: 96px;
    }

    /* Result mode — slim "선택된 교차 필터" banner; the report
       title now lives in the topbar (#arena-title), and the banner
       is purely a filter summary (label + meta + chips). */
    .builder-result {
      background: linear-gradient(180deg, rgba(252,179,0,0.06), transparent 70%),
                  var(--bg-glass);
      border: 1px solid var(--analyze-border);
      border-radius: 18px;
      padding: 16px 20px;
      backdrop-filter: blur(18px);
    }
    .builder-result__chips-row {
      display: flex; flex-direction: column; gap: 8px;
    }
    .builder-result__label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .builder-result__head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; flex-wrap: wrap;
    }

    /* In RESULT mode, .analyze-builder is empty (its [data-state]
       children are all hidden). Hide the wrapper too so .main's
       flex gap doesn't leave a phantom row above the panels. */
    .split[data-mode="result"] > .main > .analyze-builder {
      display: none;
    }

    .builder-result__topline {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; flex-wrap: wrap;
    }
    .builder-result__title {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0;
    }
    .builder-result__title h1,
    .builder-result__head > h1 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1.2;
      word-break: break-word;
      min-width: 0;
      margin: 0;
    }
    .builder-result__badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.32);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .builder-result__title h1 {
      min-width: 0;
    }
    .builder-result__meta {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .builder-result__intro {
      margin-top: 14px;
    }

    /* Review list (step 3) */
    .builder-review-card {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }
    .builder-review-card__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .builder-review-card__chips { display: flex; flex-wrap: wrap; gap: 4px; }
  </style>
</head>
<body>
  <div class="arena">
    <!-- ───────── Topbar ───────── -->
    <header class="arena-topbar" role="banner">
      <div class="arena-topbar__left">
        <button class="back-btn" aria-label="Back" data-testid="topbar-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <img class="arena-topbar__logo" alt="Space logo" src="https://api.dicebear.com/7.x/shapes/svg?seed=law&backgroundColor=06b6d4" />
        <nav class="breadcrumb">
          <span class="breadcrumb__item">법률 토론 그룹</span>
          <span class="breadcrumb__sep">›</span>
          <span class="breadcrumb__item">Apps</span>
          <span class="breadcrumb__sep">›</span>
          <span class="breadcrumb__item breadcrumb__current">Analyze</span>
        </nav>
        <span class="type-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/>
          </svg>
          Analyze
        </span>
        <span class="topbar-title" id="arena-title">새 분석 만들기</span>
      </div>
    </header>

    <!-- ───────── Body: split (main only) ───────── -->
    <div class="split" data-mode="create">

      <!-- ── Main ────────────────────────────────────────── -->
      <main class="main">

        <!-- ── Analyze Builder — 4-mode router ──────────────
             Modes via [data-mode]:
             - list    : home grid (+ new card + saved report cards)
             - create  : filter selection (panels visible below; "다음")
             - preview : confirm screen (panels hidden; name + chips + 확인)
             - result  : viewing a saved report (panels visible w/ filters
                         auto-applied; "← 목록으로" to return).
             list ↔ create ↔ preview → result → list -->
        <section class="analyze-builder" data-mode="create" id="analyze-builder">

          <!-- ── CREATE mode (filter selection) ────────────
               Now embeds the cross-filter UI inline (chips + keyword
               input + suggest chips + actions) so the wizard is a
               single card. The standalone <section class="active-filters">
               is moved here from outside the builder. -->
          <div class="builder-create" data-state="create">

            <!-- Cross-filter card — the only thing on the page in CREATE
                 mode. Three internal states via [data-add-state]:
                   - idle             : selected chips + "+ 필터 추가"
                   - picking-action   : compact chips + 4-way action picker
                   - picking-item  : compact chips + options for picked
                                        action + 확인 button
                 The page footer (취소 / 다음) is page-level, not
                 part of this card. -->
            <section class="cross-filter" data-add-state="idle" data-empty="true" id="cross-filter">
              <header class="cross-filter__head">
                <h2 class="cross-filter__title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                  </svg>
                  교차 필터
                </h2>
                <p class="cross-filter__hint">
                  분석에 사용할 데이터 조건을 선택하세요. 비워두면 전체 데이터로 분석합니다.
                </p>
              </header>

              <!-- Selected chips. Empty state shows a placeholder; once
                   filters exist they render as removable chips. In adding
                   states this strip becomes compact (smaller chips). -->
              <div class="cross-filter__chips" id="cross-filter-chips">
                <span class="cross-filter__chips-all">전체</span>
              </div>

              <!-- IDLE: just the "+ 필터 추가" CTA. -->
              <div class="cross-filter__row" data-when="idle">
                <button class="cross-filter__add-btn" type="button" id="cf-add-start">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                  필터 추가
                </button>
              </div>

              <!-- PICKING ACTION: 4 large action tiles. -->
              <div class="cross-filter__row" data-when="picking-action">
                <div class="cross-filter__pick-head">
                  <span class="cross-filter__pick-label">어떤 액션의 데이터를 추가할까요?</span>
                  <button class="cross-filter__pick-cancel" type="button" data-cf-back>취소</button>
                </div>
                <div class="cf-action-grid">
                  <button class="cf-action-tile" type="button" data-action-type="poll">
                    <span class="cf-action-tile__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
                      </svg>
                    </span>
                    <span class="cf-action-tile__label">Poll</span>
                    <span class="cf-action-tile__count">3개</span>
                  </button>
                  <button class="cf-action-tile" type="button" data-action-type="quiz">
                    <span class="cf-action-tile__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 0 1 6 0c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                      </svg>
                    </span>
                    <span class="cf-action-tile__label">Quiz</span>
                    <span class="cf-action-tile__count">2개</span>
                  </button>
                  <button class="cf-action-tile" type="button" data-action-type="discussion">
                    <span class="cf-action-tile__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                      </svg>
                    </span>
                    <span class="cf-action-tile__label">Discussion</span>
                    <span class="cf-action-tile__count">2개</span>
                  </button>
                  <button class="cf-action-tile" type="button" data-action-type="follow">
                    <span class="cf-action-tile__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
                      </svg>
                    </span>
                    <span class="cf-action-tile__label">Follow</span>
                    <span class="cf-action-tile__count">1개</span>
                  </button>
                </div>
              </div>

              <!-- PICKING ITEM: radio (single-select) list of items.
                   Clicking a radio IMMEDIATELY reveals .cf-sunji below
                   — no separate 확인 step. The user can switch the
                   picked item by clicking another radio; the below
                   card re-renders for the new item. -->
              <div class="cross-filter__row" data-when="picking-item">
                <div class="cross-filter__pick-head">
                  <span class="cross-filter__pick-label" id="cf-pick-type-label">분석할 항목을 하나 선택하세요</span>
                  <button class="cross-filter__pick-cancel" type="button" data-cf-back-to-action>← 액션 다시 선택</button>
                </div>
                <div class="cf-options-list" id="cf-options-list">
                  <!-- injected by JS — radio inputs (single-select).
                       Selection auto-opens .cf-sunji below. -->
                </div>
              </div>
            </section>

            <!-- 선지 picker — appears BELOW the cross-filter as soon
                 as the user clicks an item radio. Shows that item's
                 questions with options as checkboxes. 확인 promotes
                 the picked options into chips and resets the wizard
                 to idle. -->
            <section class="cf-sunji" id="cf-sunji" hidden>
              <header class="cf-sunji__head">
                <span class="cf-sunji__type-chip" id="cf-sunji-type" data-source="poll">POLL</span>
                <span class="cf-sunji__title" id="cf-sunji-title">선택한 항목</span>
                <button class="cross-filter__pick-cancel" type="button" id="cf-sunji-back">← 다시 선택</button>
              </header>
              <div class="cf-sunji__list" id="cf-sunji-list">
                <!-- injected by JS — checkboxes for the item's 선지 -->
              </div>
              <div class="cf-sunji__foot">
                <button class="btn btn--primary" type="button" id="cf-sunji-confirm">확인</button>
              </div>
            </section>

          </div>

          <!-- ── PREVIEW mode ──────────────────────────────
               Step indicator (2/2) and the back/save buttons live in
               the page-level fixed footer — not here — so this card
               just shows the form fields. -->
          <div class="builder-create" data-state="preview">
            <header class="cross-filter__head" style="border-bottom: none; padding-bottom: 0;">
              <h2 class="cross-filter__title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                미리보기
              </h2>
              <p class="cross-filter__hint">
                아래 내용으로 보고서가 생성됩니다. 분석명을 입력하고 "보고서 생성"을 누르세요.
              </p>
            </header>

            <span class="builder-label">분석명</span>
            <input class="builder-name-input" id="preview-name" type="text"
                   placeholder="예: 헌법 개정 의견과 무고죄 인식 교차분석" />
            <span class="builder-hint">결과 페이지와 목록 카드의 제목으로 사용됩니다.</span>

            <span class="builder-label">선택된 교차 필터</span>
            <div class="preview-chips" id="preview-chips">
              <span class="cross-filter__chips-all">전체</span>
            </div>

            <!-- Stat counts (read-only). The full record list lives
                 below as paginated per-filter tables. -->
            <div class="preview-stats">
              <div class="preview-stat">
                <span class="preview-stat__value" id="preview-count">--</span>
                <span class="preview-stat__label">해당 응답자</span>
              </div>
              <div class="preview-stat">
                <span class="preview-stat__value" id="preview-filter-count">0</span>
                <span class="preview-stat__label">해당되는 데이터 수</span>
              </div>
            </div>

            <!-- Per-filter record tables. Columns vary by source:
                   poll/quiz   → ACTION TYPE · DISPLAY ID · 문항 · 답변
                   discussion  → ACTION TYPE · DISPLAY ID · 제목 · 코멘트
                   follow      → ACTION TYPE · DISPLAY ID · 타겟 · 상태
                 Each table paginates client-side (10 rows per page). -->
            <div class="preview-records" id="preview-records">
              <!-- injected per-filter -->
            </div>

          </div>

        </section>

      </main>

    </div>

    <!-- ── Page-level fixed footers ─────────────────────────
         Two action bars, fixed to viewport bottom. Visibility
         driven by body[data-mode] (synced in setMode). They live
         OUTSIDE .builder-create (which has backdrop-filter) so
         position:fixed actually anchors to the viewport, not to
         the wizard card. -->
    <footer class="builder-actions builder-actions--create" id="footer-create" hidden>
      <div class="builder-actions__step">1 / 2</div>
      <div class="builder-actions__group">
        <button class="btn btn--ghost" id="create-cancel" type="button">취소</button>
        <button class="btn btn--primary" id="create-next" type="button">다음 →</button>
      </div>
    </footer>
    <footer class="builder-actions builder-actions--preview" id="footer-preview" hidden>
      <div class="builder-actions__step">2 / 2</div>
      <div class="builder-actions__group">
        <button class="btn btn--ghost" id="preview-back" type="button">← 이전</button>
        <button class="btn btn--primary" id="preview-confirm" type="button">보고서 생성</button>
      </div>
    </footer>
  </div>

  <script>
    (function () {
      var saved = localStorage.getItem('ratel-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();

    // ── Cross-filter UI ────────────────────────────────────
    // 3-state inline wizard:
    //   idle           → chips + "+ 필터 추가"
    //   picking-action → 4 action tiles (Poll/Quiz/Discussion/Follow)
    //   picking-item   → RADIO list of items. Selecting a radio
    //                    AUTOMATICALLY opens the .cf-sunji card
    //                    below with that item's questions/options.
    //                    Switching the radio re-renders the card.
    //                    확인 inside .cf-sunji promotes the picked
    //                    options into chips and returns to idle.
    //
    // Public API on `window.crossFilter`:
    //   .getFilters()  → snapshot of current filter records
    //   .setFilters(f) → replace entirely (used by openReport)
    //   .clear()       → reset to empty (used when entering CREATE mode)
    //   .subscribe(cb) → notified on every change (preview mode count)
    (function () {
      var root = document.getElementById('cross-filter');
      if (!root) return;
      var chipsEl       = document.getElementById('cross-filter-chips');
      var typeLabelEl   = document.getElementById('cf-pick-type-label');
      var optionsListEl = document.getElementById('cf-options-list');
      var addStartBtn   = document.getElementById('cf-add-start');
      // 선지 picker (sibling of .cross-filter)
      var sunjiRoot     = document.getElementById('cf-sunji');
      var sunjiTypeChip = document.getElementById('cf-sunji-type');
      var sunjiTitleEl  = document.getElementById('cf-sunji-title');
      var sunjiListEl   = document.getElementById('cf-sunji-list');
      var sunjiBackBtn  = document.getElementById('cf-sunji-back');
      var sunjiConfirm  = document.getElementById('cf-sunji-confirm');

      // Mock data per action type — must match the right-sidebar items
      // in RESULT mode so users see the same labels everywhere.
      var ITEMS = {
        poll: [
          { id: 'poll-1', title: '귀하는 현재 대한민국 헌법을 개정하는 것이 필요하다고 생각하십니까?', meta: '5 문항 · 128명 응답' },
          { id: 'poll-2', title: '공직 선거 연령 하향에 찬성하십니까?', meta: '3 문항 · 94명 응답' },
          { id: 'poll-3', title: '사법부 독립성 강화 방안 우선순위', meta: '7 문항 · 71명 응답' },
        ],
        quiz: [
          { id: 'quiz-1', title: '헌법 기본 상식 퀴즈', meta: '10 문항 · 86명 응시' },
          { id: 'quiz-2', title: '법률 용어 이해도 테스트', meta: '8 문항 · 47명 응시' },
        ],
        discussion: [
          { id: 'disc-1', title: '비동의 강간죄 도입에 대해서 어떻게 생각하십니까?', meta: '142 댓글 · 38명 참여' },
          { id: 'disc-2', title: '무고죄 형량 강화에 대한 시민 의견', meta: '87 댓글 · 24명 참여' },
        ],
        follow: [
          { id: 'follow-1', title: '법률 전문가 팔로우 캠페인', meta: '12 타겟 · 42명 참여' },
        ],
      };

      // 선지 catalogue per item — REAL questions with their options.
      // The 선지 picker (.cf-sunji) renders question headings with
      // the options as checkbox rows nested below. The user picks
      // options across questions; each picked option becomes one
      // chip in the cross-filter.
      //
      //   Poll: question title → options
      //   Quiz: question title → options (one is `correct: true`)
      //   Discussion: synthetic group "키워드" → keyword options;
      //               (each picked keyword filters comments containing it)
      //   Follow: synthetic group "타겟" → target options;
      //               (each picked target filters respondents who followed)
      var ITEM_QUESTIONS = {
        'poll-1': [
          { id: 'q1', title: 'Q1. 가장 시급하게 추진해야 할 헌법 개정 분야는?', options: [

          { id: 'q2', title: 'Q2. 개헌 시 가장 중요하게 다뤄져야 할 가치는?', options: [
            { id: 'q2-o1', label: '자유' },
            { id: 'q2-o2', label: '평등' },
            { id: 'q2-o3', label: '연대' },
          ]},
        ],
        'poll-2': [
          { id: 'q1', title: 'Q1. 공직 선거 연령 하향에 찬성하십니까?', options: [
            { id: 'q1-yes', label: '찬성' },
            { id: 'q1-no',  label: '반대' },
            { id: 'q1-na',  label: '모름' },

        ],
        'poll-3': [
          { id: 'q1', title: 'Q1. 사법부 독립성 강화 우선순위 1위는?', options: [
            { id: 'q1-r1', label: '인사권 분리' },
            { id: 'q1-r2', label: '예산 독립' },
            { id: 'q1-r3', label: '평가 위원회' },
          ]},
        ],
        'quiz-1': [
          { id: 'q1', title: 'Q1. 헌법 제1조의 내용은?', options: [
            { id: 'q1-o1', label: '대한민국은 민주공화국이다', correct: true },
            { id: 'q1-o2', label: '대한민국의 영토는 한반도와 부속도서이다' },
            { id: 'q1-o3', label: '모든 국민은 인간으로서의 존엄과 가치를 가진다' },
          ]},
          { id: 'q2', title: 'Q2. 대한민국의 입법권은 어디에 있는가?', options: [
            { id: 'q2-o1', label: '국회', correct: true },
            { id: 'q2-o2', label: '정부' },
            { id: 'q2-o3', label: '대통령' },
            { id: 'q2-o4', label: '법원' },

          { id: 'q3', title: 'Q3. 헌법재판소의 재판관 수는?', options: [
            { id: 'q3-o1', label: '7명' },
            { id: 'q3-o2', label: '9명', correct: true },
            { id: 'q3-o3', label: '11명' },
            { id: 'q3-o4', label: '13명' },
          ]},
        ],
        'quiz-2': [
          { id: 'q1', title: 'Q1. "기소"의 정의는?', options: [
            { id: 'q1-o1', label: '검사가 법원에 재판을 청구하는 것', correct: true },
            { id: 'q1-o2', label: '경찰이 피의자를 체포하는 것' },
            { id: 'q1-o3', label: '법원이 형벌을 선고하는 것' },
          ]},
        ],
        'disc-1': [
          { id: 'keywords', title: '댓글에 포함된 키워드 (해당 키워드를 포함한 댓글만 선별)', options: [
            { id: 'kw-증거',  label: '증거' },
            { id: 'kw-진술',  label: '진술' },
            { id: 'kw-피해자', label: '피해자' },
            { id: 'kw-처벌',  label: '처벌' },
            { id: 'kw-동의',  label: '동의' },
            { id: 'kw-무고죄', label: '무고죄' },
          ]},
          { id: 'topics', title: 'LDA 토픽', options: [
            { id: 'topic-1', label: '토픽_1: 형량 및 처벌' },
            { id: 'topic-2', label: '토픽_2: 피해자 보호' },
            { id: 'topic-3', label: '토픽_3: 수사 절차' },
          ]},
        ],
        'disc-2': [
          { id: 'keywords', title: '댓글에 포함된 키워드', options: [
            { id: 'kw-무고죄', label: '무고죄' },
            { id: 'kw-기소',  label: '기소' },
            { id: 'kw-녹음',  label: '녹음' },
            { id: 'kw-피해자', label: '피해자' },
          ]},
        ],
        'follow-1': [
          { id: 'targets', title: '팔로우 타겟 (해당 타겟을 팔로우한 응답자)', options: [
            { id: 'follow-kim',  label: '김변호 변호사' },
            { id: 'follow-park', label: '박판사 판사' },
            { id: 'follow-lee',  label: '이검사 검사' },
            { id: 'follow-choi', label: '최교수 법학교수' },
          ]},
          { id: 'completion', title: '팔로우 완성도', options: [
            { id: 'all-done',  label: '12 타겟 전부 팔로우한 응답자' },
            { id: 'half-done', label: '6 타겟 이상 팔로우한 응답자' },
            { id: 'none',      label: '한 명도 팔로우 안 한 응답자' },
          ]},
        ],
      };

      var TYPE_LABEL = { poll: 'Poll', quiz: 'Quiz', discussion: 'Discussion', follow: 'Follow' };

      // State
      var filters       = []; // [{ source, sourceLabel, label, itemId, sunjiIds }]
      var addState      = 'idle';
      var pickingType   = null;   // action type while in picking-item
      var pickedItemId  = null;   // chosen item while in picking-item
      var pickedSunjiSet = new Set();
      var subs          = [];

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function notify() {
        subs.forEach(function (cb) { try { cb(filters.slice()); } catch (_) {} });
      }

      function renderChips() {
        chipsEl.innerHTML = '';
        if (filters.length === 0) {
          var em = document.createElement('span');
          em.className = 'cross-filter__chips-all';
          em.textContent = '전체';
          chipsEl.appendChild(em);
          return;
        }
        filters.forEach(function (f, i) {
          var chip = document.createElement('span');
          chip.className = 'filter-chip';
          chip.setAttribute('data-source', f.source);
          chip.innerHTML =
            '<span class="filter-chip__source">' + escapeHtml(f.sourceLabel) + '</span>' +
            '<span class="filter-chip__label">' + escapeHtml(f.label) + '</span>' +
            '<button class="filter-chip__remove" type="button" aria-label="필터 제거" data-remove-idx="' + i + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>' +
              '</svg>' +
            '</button>';
          chipsEl.appendChild(chip);
        });
      }

      // RADIO list of items (single-select) for picking-item state.
      function renderItemsList() {
        if (!pickingType) return;
        var list = ITEMS[pickingType] || [];
        optionsListEl.innerHTML = '';
        list.forEach(function (item) {
          var row = document.createElement('label');
          row.className = 'cf-option';
          row.innerHTML =
            '<input type="radio" name="cf-item-pick" data-item-id="' + escapeHtml(item.id) + '"' +
              (pickedItemId === item.id ? ' checked' : '') + ' />' +
            '<span class="cf-option__body">' +
              '<span class="cf-option__title">' + escapeHtml(item.title) + '</span>' +
              '<span class="cf-option__meta">' + escapeHtml(item.meta) + '</span>' +
            '</span>';
          optionsListEl.appendChild(row);
        });
        if (typeLabelEl) typeLabelEl.textContent = (TYPE_LABEL[pickingType] || pickingType) + ' — 분석할 항목 하나 선택';
      }

      // Sync the 확인 button enabled state — true if any 선지 is
      // checked OR (for discussion) the keyword input has any token.
      function updateSunjiConfirmEnabled() {
        if (!sunjiConfirm) return;
        var hasSunji = pickedSunjiSet.size > 0;
        var hasKw = false;
        if (pickingType === 'discussion') {
          var kwInput = document.getElementById('cf-keyword-input');
          if (kwInput) {
            hasKw = kwInput.value.split(',').map(function (s) { return s.trim(); })
                                            .filter(Boolean).length > 0;
          }
        }
        sunjiConfirm.disabled = !(hasSunji || hasKw);
      }

      // Below-component: render the picked item's questions with their
      // options as nested checkbox rows. The user picks options across
      // any/all questions; each picked option becomes one chip.
      // For discussion items, a comma-separated keyword input is
      // prepended — each typed token becomes its own chip on 확인.
      function renderSunjiList() {
        if (!pickedItemId) return;
        var questions = ITEM_QUESTIONS[pickedItemId] || [];
        var item = (ITEMS[pickingType] || []).find(function (x) { return x.id === pickedItemId; });
        sunjiTypeChip.textContent  = (TYPE_LABEL[pickingType] || pickingType).toUpperCase();
        sunjiTypeChip.setAttribute('data-source', pickingType);
        sunjiTitleEl.textContent   = item ? item.title : '선택한 항목';

        sunjiListEl.innerHTML = '';

        // Discussion: keyword input (comma-separated) at the top.
        if (pickingType === 'discussion') {
          var kwBlock = document.createElement('div');
          kwBlock.className = 'cf-question cf-keyword-block';
          kwBlock.innerHTML =
            '<div class="cf-question__title">키워드 입력 (쉼표로 구분)</div>' +
            '<input type="text" class="cf-keyword-input" id="cf-keyword-input" ' +
              'placeholder="예: 증거, 진술, 피해자" autocomplete="off" />' +
            '<div class="cf-keyword-hint">각 키워드는 별도 필터로 추가됩니다.</div>';
          sunjiListEl.appendChild(kwBlock);
          var kwInput = kwBlock.querySelector('#cf-keyword-input');
          if (kwInput) {
            kwInput.addEventListener('input', updateSunjiConfirmEnabled);
          }
        }

        if (questions.length === 0) {
          if (pickingType !== 'discussion') {
            var em = document.createElement('div');
            em.className = 'cross-filter__chips-empty';
            em.style.padding = '20px 4px';
            em.textContent = '이 항목에는 선택할 선지가 없습니다.';
            sunjiListEl.appendChild(em);
          }
          updateSunjiConfirmEnabled();
          return;
        }
        // For discussion items, the predefined 'keywords' question is
        // superseded by the keyword input above — skip it. Other
        // questions (LDA topics, etc.) still render as checkboxes.
        var renderable = pickingType === 'discussion'
          ? questions.filter(function (q) { return q.id !== 'keywords'; })
          : questions;
        renderable.forEach(function (q) {
          var qBlock = document.createElement('div');
          qBlock.className = 'cf-question';

          var qHead = document.createElement('div');
          qHead.className = 'cf-question__title';
          qHead.textContent = q.title;
          qBlock.appendChild(qHead);

          var optList = document.createElement('div');
          optList.className = 'cf-question__options';
          q.options.forEach(function (o) {
            var optionId = q.id + ':' + o.id;
            var checked = pickedSunjiSet.has(optionId);
            var row = document.createElement('label');
            row.className = 'cf-option cf-option--inline';
            row.innerHTML =
              '<input type="checkbox" data-sunji-id="' + escapeHtml(optionId) + '"' +
                (checked ? ' checked' : '') + ' />' +
              '<span class="cf-option__body">' +
                '<span class="cf-option__title">' + escapeHtml(o.label) + '</span>' +
              '</span>' +
              (o.correct ? '<span class="cf-option__correct">정답</span>' : '');
            optList.appendChild(row);
          });
          qBlock.appendChild(optList);
          sunjiListEl.appendChild(qBlock);
        });
        updateSunjiConfirmEnabled();
      }

      // Helper: resolve a `${questionId}:${optionId}` token back to
      // the question + option records (used when building chip labels).
      function resolveSunji(itemId, sunjiId) {
        var parts = sunjiId.split(':');
        var qid = parts[0], oid = parts.slice(1).join(':');
        var questions = ITEM_QUESTIONS[itemId] || [];
        var q = questions.find(function (x) { return x.id === qid; });
        if (!q) return null;
        var o = q.options.find(function (x) { return x.id === oid; });
        if (!o) return null;
        return { question: q, option: o };
      }

      function render() {
        root.setAttribute('data-add-state', addState);
        root.setAttribute('data-empty', filters.length === 0 ? 'true' : 'false');
        renderChips();
        if (addState === 'picking-item') renderItemsList();
        // The 선지 picker (.cf-sunji) auto-opens whenever an item is
        // chosen during picking-item — no separate state transition.
        var showSunji = (addState === 'picking-item' && !!pickedItemId);
        if (sunjiRoot) sunjiRoot.hidden = !showSunji;
        if (showSunji) renderSunjiList();
        notify();
      }

      function setAddState(next) {
        addState = next;
        if (next === 'idle' || next === 'picking-action') {
          pickingType = null; pickedItemId = null; pickedSunjiSet.clear();
        } else if (next === 'picking-item') {
          pickedItemId = null; pickedSunjiSet.clear();
        }
        render();
      }

      // ── Public API ────────────────────────────────
      window.crossFilter = {
        getFilters: function () { return filters.slice(); },
        setFilters: function (next) { filters = (next || []).slice(); setAddState('idle'); },
        clear:      function () { filters = []; setAddState('idle'); },
        subscribe:  function (cb) { subs.push(cb); cb(filters.slice()); },
      };

      // ── Event wiring ──────────────────────────────
      if (addStartBtn) {
        addStartBtn.addEventListener('click', function () { setAddState('picking-action'); });
      }
      // Action-tile click → enter picking-item for that type.
      root.querySelectorAll('.cf-action-tile').forEach(function (tile) {
        tile.addEventListener('click', function () {
          pickingType = tile.getAttribute('data-action-type');
          pickedItemId = null; pickedSunjiSet.clear();
          setAddState('picking-item');
        });
      });
      // "취소" inside picking-action → back to idle.
      root.querySelectorAll('[data-cf-back]').forEach(function (b) {
        b.addEventListener('click', function () { setAddState('idle'); });
      });
      // "← 액션 다시 선택" inside picking-item → back to picking-action.
      root.querySelectorAll('[data-cf-back-to-action]').forEach(function (b) {
        b.addEventListener('click', function () { setAddState('picking-action'); });
      });
      // Item radio change → AUTO-open the .cf-sunji card below.
      // Switching the radio re-renders the card for the new item.
      if (optionsListEl) {
        optionsListEl.addEventListener('change', function (e) {
          var rb = e.target.closest('input[type="radio"][data-item-id]');
          if (!rb) return;
          pickedItemId = rb.getAttribute('data-item-id');
          pickedSunjiSet.clear();
          render();
        });
      }
      // ← 다시 선택 in 선지 picker → clear pick (closes below card).
      if (sunjiBackBtn) {
        sunjiBackBtn.addEventListener('click', function () {
          pickedItemId = null;
          pickedSunjiSet.clear();
          render();
        });
      }
      // 선지 checkbox toggle.
      if (sunjiListEl) {
        sunjiListEl.addEventListener('change', function (e) {
          var cb = e.target.closest('input[type="checkbox"][data-sunji-id]');
          if (!cb) return;
          var id = cb.getAttribute('data-sunji-id');
          if (cb.checked) pickedSunjiSet.add(id);
          else pickedSunjiSet.delete(id);
          updateSunjiConfirmEnabled();
        });
      }
      // 확인 in 선지 picker → push chip(s) into the cross-filter.
      // Each selected option becomes one chip with format
      // "{Q-id} {option label}" so the user sees question + answer.
      // For discussion items the keyword input is also drained —
      // each comma-separated token becomes its own chip.
      if (sunjiConfirm) {
        sunjiConfirm.addEventListener('click', function () {
          if (!pickedItemId) return;

          // Discussion keyword input — one chip per comma-separated
          // token. Chip label is just the keyword itself.
          if (pickingType === 'discussion') {
            var kwInput = document.getElementById('cf-keyword-input');
            if (kwInput) {
              var seen = {};
              kwInput.value.split(',').map(function (s) { return s.trim(); })
                .filter(Boolean).forEach(function (kw) {
                  if (seen[kw]) return; seen[kw] = true;
                  filters.push({
                    source: 'discussion',
                    sourceLabel: TYPE_LABEL.discussion,
                    label: kw,
                    itemId: pickedItemId,
                    questionId: 'keywords',
                    optionId: 'kw-' + kw,
                    optionText: kw,
                    questionTitle: '키워드 입력',
                  });
                });
            }
          }

          // Poll / Quiz / Follow / discussion-topics — one chip per
          // selected 선지. Chip label is just the option text (선지)
          // so the chip strip stays compact; the source badge already
          // identifies the action type.
          pickedSunjiSet.forEach(function (sid) {
            var resolved = resolveSunji(pickedItemId, sid);
            if (!resolved) return;
            filters.push({
              source: pickingType,
              sourceLabel: TYPE_LABEL[pickingType] || pickingType,
              label: resolved.option.label,
              itemId: pickedItemId,
              questionId: resolved.question.id,
              optionId: resolved.option.id,
              optionText: resolved.option.label,
              questionTitle: resolved.question.title,
              correct: resolved.option.correct === true,
            });
          });
          setAddState('idle');
        });
      }
      // Chip × → remove.
      chipsEl.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-remove-idx]');
        if (!btn) return;
        var idx = parseInt(btn.getAttribute('data-remove-idx'), 10);
        if (idx >= 0 && idx < filters.length) {
          filters.splice(idx, 1);
          render();
        }
      });

      render();
    })();

    // ── Analyze Builder — 2-mode router (CREATE ↔ PREVIEW) ────
    // Modes: create ↔ preview
    //   create  : filter selection — cross-filter card visible
    //   preview : confirm screen — name input + chip summary + 확인
    //
    // setMode propagates [data-mode] to .split / body so sibling-CSS
    // selectors hide / show the appropriate page-level fixed footer.
    (function () {
      var builder = document.getElementById('analyze-builder');
      if (!builder) return;
      var split = document.querySelector('.split');

      // CREATE elements
      var createCancel   = document.getElementById('create-cancel');
      var createNext     = document.getElementById('create-next');

      // PREVIEW elements
      var previewName    = document.getElementById('preview-name');
      var previewChips   = document.getElementById('preview-chips');
      var previewCount   = document.getElementById('preview-count');
      var previewFilterCount = document.getElementById('preview-filter-count');
      var previewBack    = document.getElementById('preview-back');
      var previewConfirm = document.getElementById('preview-confirm');

      // Cross-filter API — defined by the cross-filter IIFE above
      // (window.crossFilter). Read-through helper used in the modes
      // below so the rest of the wizard stays decoupled from the
      // filter UI's internals.
      function cfApi() { return window.crossFilter || null; }

      // State.
      var pendingFilters = [];

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function nowHHMM() {
        var d = new Date();
        return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      }
      function todayLabel() {
        var d = new Date();
        return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
      }
      function pseudoCount(n) {
        if (n === 0) return 128;
        var x = 128;
        for (var i = 0; i < n; i++) x = Math.round(x * 0.65);
        return Math.max(x, 1);
      }
      function getActiveFiltersFromDOM() {
        var api = cfApi();
        return api ? api.getFilters() : [];
      }

      function setMode(mode) {
        // Only "create" and "preview" are valid in this standalone file.
        if (mode !== 'create' && mode !== 'preview') mode = 'create';
        builder.setAttribute('data-mode', mode);
        if (split) split.setAttribute('data-mode', mode);
        // Body-level data-mode powers the page-level fixed footer
        // visibility selectors (body[data-mode="create"] etc).
        document.body.setAttribute('data-mode', mode);
        // Reveal whichever footer applies via the `hidden` attribute
        // (so Tab order / a11y is correct, not just CSS-hidden).
        var fc = document.getElementById('footer-create');
        var fp = document.getElementById('footer-preview');
        if (fc) fc.hidden = (mode !== 'create');
        if (fp) fp.hidden = (mode !== 'preview');
        if (mode === 'preview' && previewName) {
          setTimeout(function () { previewName.focus(); }, 60);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // ─── Filter helpers (delegated to the cross-filter module) ───
      function clearActiveFilters() {
        var api = cfApi();
        if (api) api.clear();
      }
      function applyFilters(filters) {
        var api = cfApi();
        if (api) api.setFilters(filters || []);
      }

      // ─── PREVIEW rendering ──────────────────────────────
      function renderPreviewChips(filters) {
        previewChips.innerHTML = '';
        if (filters.length === 0) {
          var empty = document.createElement('span');
          empty.className = 'cross-filter__chips-all';
          empty.textContent = '전체';
          previewChips.appendChild(empty);
          return;
        }
        var sourceLabel = { poll: 'Poll', quiz: 'Quiz', discussion: 'Discussion' };
        filters.forEach(function (f) {
          var chip = document.createElement('span');
          chip.className = 'preview-chip';
          chip.setAttribute('data-source', f.source);
          chip.innerHTML =
            '<span class="preview-chip__source">' + escapeHtml(sourceLabel[f.source] || f.source) + '</span>' +
            (f.group ? '<span class="preview-chip__group">' + escapeHtml(f.group) + '</span>' : '') +
            '<span>' + escapeHtml(f.label) + '</span>';
          previewChips.appendChild(chip);
        });
      }
      function renderPreviewStats(filters) {
        previewCount.textContent       = pseudoCount(filters.length);
        previewFilterCount.textContent = String(filters.length);
      }

      // ─── PREVIEW per-filter record tables ────────────────────
      // One table per selected filter, columns vary by source.
      // Each table paginates client-side (PAGE_SIZE rows per page).
      var previewRecordsEl = document.getElementById('preview-records');
      var PAGE_SIZE = 10;

      var COMMENT_TEMPLATES = [
        '충분한 KW 없이 처벌만 강화하면 무고한 사람이 피해를 볼 수 있습니다.',
        'KW 능력이 의심되는 진술만으로는 기소를 신중히 해야 합니다.',
        'KW 보호와 가해자 인권 사이의 균형이 필요하다고 봅니다.',
        'KW를 인정하기 위한 절차가 더 명확해야 합니다.',
        '시민의 KW 참여 절차가 우선되어야 한다고 봅니다.',
        '제도적 KW 이 마련되지 않으면 부작용이 더 클 것입니다.',
        'KW 관련 교육이 학교부터 도입되어야 한다고 생각합니다.',
        'KW 가해자에 대한 사회적 낙인을 줄이는 정책이 필요합니다.',
      ];
      var DISC_ITEM_TITLES = {
        'disc-1': '비동의 강간죄 도입에 대해서 어떻게 생각하십니까?',
        'disc-2': '무고죄 형량 강화에 대한 시민 의견',
      };
      var SOURCE_BADGE = { poll: 'POLL', quiz: 'QUIZ', discussion: 'DISCUSSION', follow: 'FOLLOW' };

      function buildAnonName(i) {
        var pool = ['나비','사슴','별자리','숲','등대','파도','달빛','바람','조약돌','새벽','빗방울','단풍','연꽃','노을','안개'];
        var seed = pool[i % pool.length];
        return '익명_' + seed + '_' + (100 + i * 17 % 900);
      }

      // Build the full row dataset + column headers for a filter.
      function generateRecordsForFilter(f) {
        var src = f.source;
        var typeLabel = SOURCE_BADGE[src] || (src || '').toUpperCase();
        var rows;
        if (src === 'poll' || src === 'quiz') {
          var total = 30 + (f.optionId || '').length * 3;
          rows = [];
          for (var i = 0; i < total; i++) {
            var ans = escapeHtml(f.optionText || '') +
              (src === 'quiz' && f.correct ? '<span class="prv-tag-correct">정답</span>' : '');
            rows.push([
              { cls: 'prv-cell--type',     html: escapeHtml(typeLabel) },
              { cls: 'prv-cell--id',       html: escapeHtml(buildAnonName(i)) },
              { cls: 'prv-cell--question', html: escapeHtml(f.questionTitle || '') },
              { cls: 'prv-cell--answer',   html: ans },
            ]);
          }
          return {
            columns: ['ACTION TYPE', 'DISPLAY ID', '문항', '답변'],
            rows: rows,
            total: total,
            groupTitle: (f.questionTitle || '') + ' → ' + (f.optionText || ''),
          };
        }
        if (src === 'discussion') {
          var keyword = f.optionText || '';
          var totalC = 12 + keyword.length * 2;
          var discTitle = DISC_ITEM_TITLES[f.itemId] || '디스커션';
          rows = [];
          for (var j = 0; j < totalC; j++) {
            var commentText = COMMENT_TEMPLATES[j % COMMENT_TEMPLATES.length].replace(/KW/g, keyword);
            rows.push([
              { cls: 'prv-cell--type',    html: escapeHtml(typeLabel) },
              { cls: 'prv-cell--id',      html: escapeHtml(buildAnonName(j)) },
              { cls: 'prv-cell--title',   html: escapeHtml(discTitle) },
              { cls: 'prv-cell--answer',  html: escapeHtml(commentText) },
            ]);
          }
          return {
            columns: ['ACTION TYPE', 'DISPLAY ID', '제목', '코멘트'],
            rows: rows,
            total: totalC,
            groupTitle: '키워드 "' + keyword + '"',
          };
        }
        if (src === 'follow') {
          var target = f.optionText || '';
          var totalF = 22;
          var statusText = target.indexOf('팔로우 안') > -1 ? '✗ 미수행' : '✓ 팔로우 완료';
          rows = [];
          for (var m = 0; m < totalF; m++) {
            rows.push([
              { cls: 'prv-cell--type',    html: escapeHtml(typeLabel) },
              { cls: 'prv-cell--id',      html: escapeHtml(buildAnonName(m + 3)) },
              { cls: 'prv-cell--title',   html: escapeHtml(target) },
              { cls: 'prv-cell--answer',  html: escapeHtml(statusText) },
            ]);
          }
          return {
            columns: ['ACTION TYPE', 'DISPLAY ID', '타겟', '상태'],
            rows: rows,
            total: totalF,
            groupTitle: target,
          };
        }
        return { columns: [], rows: [], total: 0, groupTitle: f.label || '' };
      }

      // Build a single merged table for all filters that share the
       // same action type (source). Columns are fixed per source; rows
       // from every filter in the group are concatenated, then the
       // whole thing paginates as one.
      function buildMergedRecordsTable(source, filtersForSource) {
        var allRows = [];
        var columns = null;
        filtersForSource.forEach(function (f) {
          var data = generateRecordsForFilter(f);
          if (!columns) columns = data.columns;
          for (var i = 0; i < data.rows.length; i++) allRows.push(data.rows[i]);
        });
        if (!columns) columns = [];

        var totalPages = Math.max(1, Math.ceil(allRows.length / PAGE_SIZE));
        var currentPage = 0;

        var wrap = document.createElement('div');
        wrap.className = 'prv-table';
        wrap.setAttribute('data-source', source || '');

        // Header: source chip + comma-separated filter labels + total count.
        var labelText = filtersForSource.map(function (f) { return f.label || ''; })
                                        .filter(Boolean).join(', ');
        var head = document.createElement('header');
        head.className = 'prv-table__head';
        head.innerHTML =
          '<span class="prv-table__chip" data-source="' + escapeHtml(source || '') + '">' +
            escapeHtml(SOURCE_BADGE[source] || (source || '').toUpperCase()) +
          '</span>' +
          '<span class="prv-table__title">' + escapeHtml(labelText) + '</span>' +
          '<span class="prv-table__count">' +
            filtersForSource.length + '개 필터 · ' + allRows.length + '건' +
          '</span>';
        wrap.appendChild(head);

        var scroll = document.createElement('div');
        scroll.className = 'prv-table__scroll';
        var table = document.createElement('table');
        table.className = 'prv-table__grid';
        var thead = document.createElement('thead');
        var headerRow = document.createElement('tr');
        columns.forEach(function (col) {
          var th = document.createElement('th');
          th.textContent = col;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);
        var tbody = document.createElement('tbody');
        table.appendChild(tbody);
        scroll.appendChild(table);
        wrap.appendChild(scroll);

        var pager = document.createElement('footer');
        pager.className = 'prv-table__pager';
        var prevBtn = document.createElement('button');
        prevBtn.type = 'button';
        prevBtn.className = 'prv-pager-btn';
        prevBtn.textContent = '← 이전';
        var pageInfo = document.createElement('span');
        pageInfo.className = 'prv-pager-info';
        var nextBtn = document.createElement('button');
        nextBtn.type = 'button';
        nextBtn.className = 'prv-pager-btn';
        nextBtn.textContent = '다음 →';
        pager.appendChild(prevBtn);
        pager.appendChild(pageInfo);
        pager.appendChild(nextBtn);
        wrap.appendChild(pager);

        function renderPage() {
          tbody.innerHTML = '';
          var start = currentPage * PAGE_SIZE;
          var end = start + PAGE_SIZE;
          allRows.slice(start, end).forEach(function (cells) {
            var tr = document.createElement('tr');
            cells.forEach(function (c) {
              var td = document.createElement('td');
              if (c.cls) td.className = c.cls;
              td.innerHTML = c.html;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          pageInfo.textContent = (currentPage + 1) + ' / ' + totalPages;
          prevBtn.disabled = currentPage === 0;
          nextBtn.disabled = currentPage >= totalPages - 1;
        }
        prevBtn.addEventListener('click', function () {
          if (currentPage > 0) { currentPage--; renderPage(); }
        });
        nextBtn.addEventListener('click', function () {
          if (currentPage < totalPages - 1) { currentPage++; renderPage(); }
        });
        renderPage();
        return wrap;
      }

      // Group filters by source (poll → poll, quiz → quiz, etc.) so
       // each action type produces a single merged table.
      function renderPreviewRecords(filters) {
        if (!previewRecordsEl) return;
        previewRecordsEl.innerHTML = '';
        // No filters → "전체" mode. The chip strip above already
        // communicates this; the records area stays empty (no tables).
        if (!filters || filters.length === 0) return;
        var bySource = {};
        var seenOrder = [];
        filters.forEach(function (f) {
          var s = f.source || 'unknown';
          if (!bySource[s]) { bySource[s] = []; seenOrder.push(s); }
          bySource[s].push(f);
        });
        // Stable display order: known sources first, then any extras.
        var ORDER = ['poll', 'quiz', 'discussion', 'follow'];
        var order = ORDER.filter(function (s) { return bySource[s]; })
                         .concat(seenOrder.filter(function (s) { return ORDER.indexOf(s) === -1; }));
        order.forEach(function (s) {
          previewRecordsEl.appendChild(buildMergedRecordsTable(s, bySource[s]));
        });
      }

      // ─── Event wiring ───────────────────────────────────
      if (createCancel) createCancel.addEventListener('click', function () {
        clearActiveFilters();
        // Standalone CREATE wizard: cancel returns to the list page.
        window.location.href = './analyze-list-arena.html';
      });
      if (createNext) createNext.addEventListener('click', function () {
        pendingFilters = getActiveFiltersFromDOM();
        renderPreviewChips(pendingFilters);
        renderPreviewStats(pendingFilters);
        renderPreviewRecords(pendingFilters);
        if (previewName) previewName.value = '';
        setMode('preview');
      });

      if (previewBack) previewBack.addEventListener('click', function () {
        setMode('create');
      });
      if (previewConfirm) previewConfirm.addEventListener('click', function () {
        // Standalone CREATE wizard: navigate to the detail/result page.
        // (The list/result store lives elsewhere — no in-memory persistence here.)
        window.location.href = './analyze-detail-arena.html';
      });

      // Boot directly into CREATE mode.
      setMode('create');
    })();
  </script>
</body>
</html>
