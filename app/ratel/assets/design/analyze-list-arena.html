<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyze — Split Arena (Master / Detail)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html[data-theme="dark"] {
      --bg-void: #06060e;
      --bg-glass: rgba(12, 12, 26, 0.65);
      --bg-glass-hover: rgba(20, 20, 40, 0.80);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text-primary: #f0f0f5;
      --text-muted: #8888a8;
      --text-dim: #55556a;
      --surface-soft: rgba(255, 255, 255, 0.02);
      --surface-hover: rgba(255, 255, 255, 0.04);
      --glow-aura-a: rgba(6, 182, 212, 0.05);
      --glow-aura-b: rgba(252, 179, 0, 0.03);
      --panel-bg: rgba(12, 12, 26, 1);
      --input-bg: rgba(255, 255, 255, 0.02);
      --input-border: rgba(255, 255, 255, 0.08);
      --bar-track: rgba(255, 255, 255, 0.04);
      --bubble-fill: rgba(173, 197, 220, 0.85);
      --bubble-stroke: rgba(255, 255, 255, 0.10);
      --bubble-text: #0c0c1a;
      --network-link: rgba(255, 255, 255, 0.10);
    }
    html[data-theme="light"] {
      --bg-void: #f5f5fb;
      --bg-glass: rgba(255, 255, 255, 0.75);
      --bg-glass-hover: rgba(255, 255, 255, 0.95);
      --border-subtle: rgba(10, 10, 30, 0.08);
      --border-strong: rgba(10, 10, 30, 0.16);
      --text-primary: #12121a;
      --text-muted: #5b5b75;
      --text-dim: #9898ad;
      --surface-soft: rgba(10, 10, 30, 0.03);
      --surface-hover: rgba(10, 10, 30, 0.05);
      --glow-aura-a: rgba(6, 182, 212, 0.08);
      --glow-aura-b: rgba(252, 179, 0, 0.06);
      --panel-bg: rgba(255, 255, 255, 1);
      --input-bg: rgba(10, 10, 30, 0.02);
      --input-border: rgba(10, 10, 30, 0.1);
      --bar-track: rgba(10, 10, 30, 0.06);
      --bubble-fill: rgba(96, 142, 188, 0.85);
      --bubble-stroke: rgba(10, 10, 30, 0.12);
      --bubble-text: #ffffff;
      --network-link: rgba(10, 10, 30, 0.16);
    }

    :root {
      --accent-gold: #fcb300;
      --accent-teal: #6eedd8;
      --accent-red: #ef4444;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Outfit', sans-serif;

      --analyze-color: #06b6d4;
      --analyze-bg: rgba(6, 182, 212, 0.10);
      --analyze-border: rgba(6, 182, 212, 0.24);
      --analyze-glow: rgba(6, 182, 212, 0.16);

      /* Per-action-type colour identity (matches the action edit cards) */
      --poll-color: #06b6d4;        --poll-bg: rgba(6, 182, 212, 0.10);
      --poll-border: rgba(6, 182, 212, 0.24);
      --quiz-color: #a855f7;        --quiz-bg: rgba(168, 85, 247, 0.10);
      --quiz-border: rgba(168, 85, 247, 0.24);
      --discussion-color: #60a5fa;  --discussion-bg: rgba(96, 165, 250, 0.10);
      --discussion-border: rgba(96, 165, 250, 0.24);
      --follow-color: #f97316;      --follow-bg: rgba(249, 115, 22, 0.10);
      --follow-border: rgba(249, 115, 22, 0.24);

      --c1: #f97316;
      --c2: #6366f1;
      --c3: #22c55e;
      --c4: #3b82f6;
      --c5: #8b5cf6;
      --c6: #eab308;

      --bar-fill: #4f7aa3;
      --bar-fill-strong: #5d8cba;

      /* Quiz: correct option highlight (green) */
      --quiz-correct: #22c55e;
      --quiz-correct-soft: rgba(34, 197, 94, 0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-body);
      transition: background 0.25s, color 0.25s;
      overflow-x: hidden; /* contains 100vw breakouts (carousel) */
    }

    .arena {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .arena::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, var(--glow-aura-a), transparent 60%),
        radial-gradient(ellipse 120% 100% at 50% 120%, var(--glow-aura-b), transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    /* ── Topbar ────────────────────────────────────────── */
    .arena-topbar {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; gap: 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .arena-topbar__left {
      display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    .back-btn:hover { border-color: rgba(252, 179, 0, 0.3); color: var(--accent-gold); }
    .back-btn svg { width: 16px; height: 16px; }

    .arena-topbar__logo {
      width: 36px; height: 36px; border-radius: 9px;
      object-fit: cover;
      border: 1px solid rgba(252, 179, 0, 0.15);
      flex-shrink: 0;
    }

    .breadcrumb { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .breadcrumb__item {
      font-family: var(--font-display);
      font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .breadcrumb__sep { color: var(--text-dim); font-size: 10px; }
    .breadcrumb__current { color: var(--text-primary); font-weight: 600; }

    .type-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 8px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--analyze-bg);
      color: var(--analyze-color);
      border: 1px solid var(--analyze-border);
    }
    .type-badge svg { width: 13px; height: 13px; }

    .topbar-title {
      flex: 1; min-width: 180px;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em;
      padding: 6px 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    @media (max-width: 760px) {
      .arena-topbar { padding: 12px 14px; gap: 10px; }
      .breadcrumb, .type-badge { display: none; }
      .topbar-title { min-width: 0; font-size: 13px; padding: 0; }
    }

    /* ── Split layout ─────────────────────────────────── */
    .split {
      position: relative; z-index: 10;
      flex: 1;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      padding: 24px 24px 80px;
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
    }
    /* Sidebar lives on the LEFT visually; HTML order keeps <main> first
       for accessibility, so we place each column explicitly. */
    .sidebar { grid-column: 1; grid-row: 1; }
    .main    { grid-column: 2; grid-row: 1; }
    @media (max-width: 1100px) {
      .split { grid-template-columns: 1fr; }
      .sidebar { grid-column: 1; order: -1; position: static !important; max-height: none !important; }
      .main    { grid-column: 1; }
    }
    @media (max-width: 760px) {
      .split { padding: 14px; gap: 14px; }
    }

    /* ── Main (left) ──────────────────────────────────── */
    .main { display: flex; flex-direction: column; gap: 18px; min-width: 0; }

    .main-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .main-title__chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 100px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .main-title__chip--poll       { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .main-title__chip--quiz       { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .main-title__chip--discussion { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .main-title__chip--follow     { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }
    .main-title__chip svg { width: 12px; height: 12px; }

    /* ── Detail panels — only one is visible at a time ─ */
    .panel { display: none; flex-direction: column; gap: 18px; }
    .panel[data-active="true"] { display: flex; }

    /* ── Card primitive ───────────────────────────────── */
    .card {
      background: var(--bg-glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    @media (max-width: 760px) { .card { padding: 16px; gap: 12px; } }

    .card__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .card__title { min-width: 0; flex: 1; font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .card__count {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 100px;
      background: var(--analyze-bg);
      border: 1px solid var(--analyze-border);
      color: var(--analyze-color);
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .card__action {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .card__action:hover {
      border-color: var(--analyze-border);
      color: var(--analyze-color);
    }
    .card__action svg { width: 14px; height: 14px; }

    /* ── Panel toolbar (filter + actions, e.g. download) ─ */
    .panel-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .panel-toolbar > .filter-select-wrap { flex-shrink: 0; }
    .panel-toolbar .btn { flex-shrink: 0; }
    .btn svg { width: 14px; height: 14px; }

    /* ── Filter bar (poll panel) ──────────────────────── */
    .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-select-wrap { position: relative; display: inline-flex; }
    .filter-select {
      appearance: none; -webkit-appearance: none;
      min-width: 160px;
      padding: 9px 32px 9px 12px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      cursor: pointer; outline: none; transition: all 0.15s;
    }
    .filter-select:hover { border-color: var(--analyze-border); }
    .filter-select:focus {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .filter-select-wrap::after {
      content: ''; position: absolute; right: 12px; top: 50%;
      width: 7px; height: 7px;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      transform: translateY(-75%) rotate(45deg);
      pointer-events: none;
    }

    /* ── Poll / Quiz panels: horizontal bar chart ───── */
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center; gap: 12px;
    }
    .bar-row__label {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      color: var(--text-muted); text-align: center;
    }
    .bar-row__track {
      position: relative;
      height: 12px; width: 100%;
      border-radius: 100px;
      background: var(--bar-track);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .bar-row__fill {
      position: absolute; inset: 0 auto 0 0;
      border-radius: 100px;
      transition: width 0.3s ease;
    }
    .bar-row__value {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap; min-width: 96px; text-align: right;
    }
    /* Quiz: correct option — only the text colour changes, so the
       answer is immediately legible without breaking the chart's
       column rhythm. */
    .bar-row[data-correct="true"] .bar-row__label,
    .bar-row[data-correct="true"] .bar-row__value {
      color: var(--quiz-correct);
    }
    .bar-row__check {
      display: inline-block;
      margin-right: 4px;
      color: var(--quiz-correct);
      font-weight: 800;
    }

    /* ── Discussion panel ───────────────────────────── */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field__label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .field__hint { font-size: 11px; color: var(--text-muted); }
    .field__input {
      width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none; transition: all 0.15s;
    }
    .field__input:focus {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .settings-foot { display: flex; justify-content: flex-end; gap: 10px; }

    .btn {
      padding: 8px 14px;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-primary);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn--ghost { background: var(--surface-soft); color: var(--text-muted); }
    .btn--ghost:hover { border-color: var(--analyze-border); color: var(--text-primary); }
    .btn--primary {
      background: linear-gradient(135deg, var(--accent-gold), #e5a200);
      border: none; color: #0a0a0a;
      box-shadow: 0 2px 12px rgba(252, 179, 0, 0.25);
    }
    .btn--primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(252, 179, 0, 0.4); }

    /* ── Subjective text response list (Poll panel) ──── */
    .text-list { display: flex; flex-direction: column; gap: 8px; }
    .text-item {
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
      /* `pre-line` keeps user-entered newlines but collapses the HTML
         indentation whitespace, otherwise the leading spaces from the
         source markup show up as a visible gap before the answer. */
      white-space: pre-line;
    }

    /* TF-IDF mini chart */
    .tfidf-chart { display: flex; flex-direction: column; gap: 8px; }
    .tfidf-row {
      display: grid;
      grid-template-columns: 96px 1fr 56px;
      align-items: center; gap: 10px;
    }
    .tfidf-row__keyword {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tfidf-row__track {
      position: relative; height: 18px; width: 100%;
      border-radius: 5px;
      background: var(--bar-track);
      overflow: hidden;
    }
    .tfidf-row__fill {
      position: absolute; inset: 0 auto 0 0;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--bar-fill), var(--bar-fill-strong));
      transition: width 0.3s ease;
    }
    .tfidf-row__value {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      color: var(--text-primary); text-align: right;
    }

    /* ── LDA topic table (Discussion panel) ─────────── */
    .topic-table { display: flex; flex-direction: column; }
    .topic-table__head {
      display: grid;
      grid-template-columns: 90px 1fr 36px;
      gap: 12px;
      padding: 8px 4px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .topic-table__row {
      display: grid;
      grid-template-columns: 90px 1fr 36px;
      align-items: center; gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s;
    }
    .topic-table__row:hover { background: var(--surface-soft); }
    .topic-table__row:last-child { border-bottom: none; }
    .topic-table__id {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }
    .topic-table__id-input {
      width: 100%;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.04em;
      outline: none; transition: all 0.15s;
      display: none;
    }
    .topic-table__id-input:focus {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .topic-table[data-edit="true"] .topic-table__id { display: none; }
    .topic-table[data-edit="true"] .topic-table__id-input { display: block; }
    .topic-table__keywords {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      word-break: keep-all;
    }

    /* ── Text Network (Discussion panel) ──────────── */
    .network-wrap {
      width: 100%;
      aspect-ratio: 35 / 29;
      max-height: 460px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .network-svg { width: 100%; height: 100%; display: block; }
    .network-bubble {
      fill: var(--bubble-fill);
      stroke: var(--bubble-stroke);
      stroke-width: 1;
    }
    .network-bubble-text {
      fill: var(--bubble-text);
      font-family: var(--font-body);
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .network-link {
      stroke: var(--network-link);
      stroke-width: 1;
      fill: none;
    }

    /* ── Follow panel ──────────────────────────────── */
    .follow-legend {
      display: flex; gap: 18px; flex-wrap: wrap;
      padding: 4px 0 4px;
    }
    .follow-legend__item {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .follow-legend__swatch {
      width: 12px; height: 12px; border-radius: 3px;
    }
    .follow-legend__swatch--done { background: var(--follow-color); }
    .follow-legend__swatch--miss { background: var(--bar-track); border: 1px solid var(--border-subtle); }

    .follow-list { display: flex; flex-direction: column; gap: 12px; }
    .follow-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(0, 2fr) 110px;
      align-items: center;
      gap: 14px;
      padding: 12px 6px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .follow-row:last-child { border-bottom: none; }
    .follow-row__user { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .follow-row__avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .follow-row__meta { display: flex; flex-direction: column; min-width: 0; }
    .follow-row__name {
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .follow-row__handle {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    .follow-row__bar {
      position: relative;
      height: 18px; width: 100%;
      border-radius: 5px;
      background: var(--bar-track);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .follow-row__bar-done {
      position: absolute; inset: 0 auto 0 0;
      background: linear-gradient(90deg, var(--follow-color), #ea580c);
      transition: width 0.3s ease;
    }
    .follow-row__stats {
      display: flex; flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .follow-row__rate {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      color: var(--follow-color);
    }
    .follow-row__count {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 600;
      color: var(--text-muted);
    }
    @media (max-width: 760px) {
      .follow-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .follow-row__stats { flex-direction: row; align-items: center; }
    }

    /* ── Sidebar (right) ──────────────────────────── */
    .sidebar {
      align-self: start;
      position: sticky; top: 84px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      background: var(--bg-glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar__head {
      padding: 4px 6px 12px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 6px;
    }
    .sidebar__head-label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .sb-group { display: flex; flex-direction: column; }
    .sb-group__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
      padding: 10px 6px 8px;
      cursor: pointer;
      user-select: none;
    }
    .sb-group__head-left {
      display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    .sb-group__icon {
      width: 26px; height: 26px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-group__icon svg { width: 14px; height: 14px; }
    .sb-group--poll       .sb-group__icon { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .sb-group--quiz       .sb-group__icon { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .sb-group--discussion .sb-group__icon { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .sb-group--follow     .sb-group__icon { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }

    .sb-group__label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-primary);
    }
    .sb-group__count {
      padding: 2px 8px; border-radius: 100px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      color: var(--text-muted);
    }
    .sb-group__chevron {
      width: 14px; height: 14px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .sb-group[data-collapsed="true"] .sb-group__chevron { transform: rotate(-90deg); }
    .sb-group[data-collapsed="true"] .sb-group__list { display: none; }

    .sb-group__list { display: flex; flex-direction: column; gap: 2px; }
    .sb-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 10px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left; width: 100%;
    }
    .sb-item:hover {
      background: var(--surface-soft);
      border-color: var(--border-subtle);
    }
    .sb-item[aria-selected="true"] {
      background: var(--analyze-bg);
      border-color: var(--analyze-border);
    }
    .sb-item__indicator {
      width: 6px; height: 6px; border-radius: 50%;
      margin-top: 7px; flex-shrink: 0;
      background: var(--text-dim);
      transition: all 0.15s;
    }
    .sb-item[aria-selected="true"] .sb-item__indicator {
      background: var(--analyze-color);
      box-shadow: 0 0 8px var(--analyze-color);
    }
    .sb-item__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .sb-item__title {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sb-item[aria-selected="true"] .sb-item__title { color: var(--text-primary); font-weight: 600; }
    .sb-item__meta {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .sb-empty {
      padding: 14px 10px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px dashed var(--border-subtle);
      color: var(--text-dim);
      font-size: 12px;
      font-style: italic;
      text-align: center;
    }

    /* ── Active filter bar — visible across all panels ───── */
    .active-filters {
      position: sticky;
      top: 76px;
      z-index: 20;
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .active-filters[data-empty="true"] {
      border-style: dashed;
    }
    .active-filters[data-empty="false"] {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .active-filters__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .active-filters__title {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--analyze-color);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .active-filters__title svg { width: 13px; height: 13px; }
    .active-filters__count {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .active-filters__list {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 26px; align-items: center;
    }
    .active-filters__empty {
      font-size: 12px; font-style: italic;
      color: var(--text-dim);
    }
    .active-filters[data-empty="false"] .active-filters__empty { display: none; }
    .active-filters__actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      border-top: 1px solid var(--border-subtle);
      padding-top: 10px;
    }
    .active-filters__actions .btn { font-size: 9px; padding: 6px 10px; }

    /* Filter chip (rendered for each active filter) */
    .filter-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 6px 4px 10px;
      border-radius: 100px;
      font-size: 12px; font-weight: 500;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .filter-chip__source {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 100px;
    }
    .filter-chip[data-source="poll"]       .filter-chip__source { background: var(--poll-bg);       color: var(--poll-color); }
    .filter-chip[data-source="quiz"]       .filter-chip__source { background: var(--quiz-bg);       color: var(--quiz-color); }
    .filter-chip[data-source="discussion"] .filter-chip__source { background: var(--discussion-bg); color: var(--discussion-color); }
    .filter-chip__group {
      font-size: 10px; color: var(--text-muted);
      max-width: 120px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .filter-chip__label {
      max-width: 200px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .filter-chip__remove {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      border: none; border-radius: 100px;
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-chip__remove:hover {
      background: rgba(239, 68, 68, 0.16);
      color: var(--accent-red);
    }
    .filter-chip__remove svg { width: 12px; height: 12px; }

    /* ── Make bar-rows interactive (filter source) ───────── */
    button.bar-row[data-filter-source] {
      width: 100%;
      font: inherit;
      color: inherit;
      text-align: left;
      background: transparent;
      cursor: pointer;
      padding: 6px;
      margin: -6px;
      border: 1px solid transparent;
      border-radius: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    button.bar-row[data-filter-source]:hover {
      background: var(--surface-hover);
      border-color: var(--border-subtle);
    }
    button.bar-row[data-filter-source][aria-pressed="true"] {
      background: var(--analyze-bg);
      border-color: var(--analyze-border);
    }
    button.bar-row[data-filter-source][aria-pressed="true"] .bar-row__label {
      color: var(--analyze-color);
    }
    button.bar-row[data-filter-source][aria-pressed="true"] .bar-row__label::before {
      content: '✓ ';
      font-weight: 800;
    }
    /* Quiz panel's filter source uses quiz palette */
    button.bar-row[data-filter-source="quiz"][aria-pressed="true"] {
      background: var(--quiz-bg);
      border-color: var(--quiz-border);
    }
    button.bar-row[data-filter-source="quiz"][aria-pressed="true"] .bar-row__label {
      color: var(--quiz-color);
    }

    /* Card-level filter hint (small, italic, dashed) */
    .card__hint {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px dashed var(--border-subtle);
      align-self: flex-start;
    }
    .card__hint svg { width: 12px; height: 12px; flex-shrink: 0; color: var(--analyze-color); }

    /* ── Discussion: keyword filter card ─────────────────── */
    .kw-filter { display: flex; flex-direction: column; gap: 12px; }
    .kw-filter__field {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .kw-filter__input {
      flex: 1; min-width: 200px;
      padding: 9px 12px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none; transition: all 0.15s;
    }
    .kw-filter__input:focus {
      border-color: var(--discussion-border);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.16);
    }
    .kw-filter__hint { font-size: 11px; color: var(--text-muted); }
    .kw-filter__chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .kw-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 100px;
      font-size: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-family: var(--font-body);
      cursor: pointer; transition: all 0.15s;
    }
    .kw-chip:hover { color: var(--text-primary); border-color: var(--discussion-border); }
    .kw-chip[aria-pressed="true"] {
      background: var(--discussion-bg);
      border-color: var(--discussion-border);
      color: var(--discussion-color);
      font-weight: 600;
    }

    /* TF-IDF row: clickable as keyword filter */
    button.tfidf-row[data-filter-source] {
      width: 100%;
      font: inherit; color: inherit; text-align: left;
      background: transparent;
      cursor: pointer;
      padding: 4px 6px;
      margin: -4px -6px;
      border: 1px solid transparent;
      border-radius: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    button.tfidf-row[data-filter-source]:hover {
      background: var(--surface-hover);
      border-color: var(--border-subtle);
    }
    button.tfidf-row[data-filter-source][aria-pressed="true"] {
      background: var(--discussion-bg);
      border-color: var(--discussion-border);
    }
    button.tfidf-row[data-filter-source][aria-pressed="true"] .tfidf-row__keyword {
      color: var(--discussion-color);
      font-weight: 700;
    }
    button.tfidf-row[data-filter-source][aria-pressed="true"] .tfidf-row__keyword::before {
      content: '✓ ';
      font-weight: 800;
    }

    /* Topic-table row: small "filter" toggle on the right */
    .topic-table__row { position: relative; }
    .topic-table__filter {
      grid-column: 3 / 4;
      justify-self: end;
      align-self: center;
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .topic-table__filter svg { width: 13px; height: 13px; }
    .topic-table__filter:hover {
      border-color: var(--discussion-border);
      color: var(--discussion-color);
    }
    .topic-table__filter[aria-pressed="true"] {
      background: var(--discussion-bg);
      border-color: var(--discussion-border);
      color: var(--discussion-color);
    }

    /* ── Snapshot list (sidebar) ─────────────────────────── */
    .sb-snapshots { display: flex; flex-direction: column; gap: 6px; }
    .snap-item {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      transition: all 0.15s;
    }
    .snap-item:hover {
      background: var(--surface-hover);
      border-color: var(--analyze-border);
    }
    .snap-item__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .snap-item__name {
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snap-item__time {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .snap-item__summary {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .snap-item__actions { display: flex; gap: 6px; }
    .snap-item__btn {
      flex: 1;
      padding: 5px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .snap-item__btn--restore:hover {
      border-color: var(--analyze-border); color: var(--analyze-color);
    }
    .snap-item__btn--delete:hover {
      border-color: rgba(239, 68, 68, 0.4); color: var(--accent-red);
    }

    /* ── Analyze Builder — top-of-main wrapper ────────────── */
    .analyze-builder { display: flex; flex-direction: column; gap: 18px; }

    /* 4-mode state visibility: list → create → preview → result.
       Only the matching [data-state] block renders. */
    .analyze-builder [data-state] { display: none; }
    .analyze-builder[data-mode="list"]    [data-state="list"]    { display: flex; flex-direction: column; gap: 18px; }
    .analyze-builder[data-mode="create"]  [data-state="create"]  { display: flex; flex-direction: column; gap: 16px; }
    .analyze-builder[data-mode="preview"] [data-state="preview"] { display: flex; flex-direction: column; gap: 16px; }
    .analyze-builder[data-mode="result"]  [data-state="result"]  { display: flex; flex-direction: column; gap: 16px; }

    /* In list/create/preview modes the panels (Poll/Quiz/Discussion/
       Follow detail) are irrelevant — only the wizard card is visible.
       In RESULT mode panels are the actual report content, so they show. */
    .analyze-builder[data-mode="list"]    ~ .active-filters,
    .analyze-builder[data-mode="list"]    ~ .panel,
    .analyze-builder[data-mode="create"]  ~ .active-filters,
    .analyze-builder[data-mode="create"]  ~ .panel,
    .analyze-builder[data-mode="preview"] ~ .active-filters,
    .analyze-builder[data-mode="preview"] ~ .panel {
      display: none !important;
    }

    /* In list/create/preview modes also hide the right sidebar and let
       main span full width. (CREATE shouldn't show the analyzes
       sidebar — only the cross-filter card.) */
    .split[data-mode="list"]    .sidebar,
    .split[data-mode="create"]  .sidebar,
    .split[data-mode="preview"] .sidebar {
      display: none !important;
    }
    .split[data-mode="list"],
    .split[data-mode="create"],
    .split[data-mode="preview"] {
      grid-template-columns: 1fr !important;
    }
    .split[data-mode="list"]    > .main,
    .split[data-mode="create"]  > .main,
    .split[data-mode="preview"] > .main {
      grid-column: 1 !important;
    }

    /* RESULT mode layout — cross-filter banner spans BOTH columns
       across the top, then the sidebar + main fill the row below it.
         row 1: banner banner   ← .builder-result, full-width
         row 2: sidebar main    ← ANALYZES + detail panel
       The banner is a direct sibling of .main inside .split (so it
       can participate in the split grid). */
    .split > .builder-result { display: none; }
    .split[data-mode="result"] {
      grid-template-columns: 320px minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "banner  banner"
        "sidebar main";
    }
    .split[data-mode="result"] > .builder-result {
      display: flex;
      flex-direction: column;
      gap: 16px;
      grid-area: banner;
    }
    .split[data-mode="result"] > .sidebar { grid-area: sidebar; }
    .split[data-mode="result"] > .main    { grid-area: main; }
    @media (max-width: 1100px) {
      .split[data-mode="result"] {
        grid-template-columns: 1fr;
        grid-template-areas:
          "banner"
          "sidebar"
          "main";
      }
    }

    /* In CREATE mode panels are used for filter selection; the
       per-panel "전체/성별/.../응답 다운로드" toolbar is irrelevant
       there. It only makes sense when viewing a saved analysis. */
    .split[data-mode="create"] .panel-toolbar {
      display: none !important;
    }

    /* In result mode the report is read-only — disable filter clicks,
       hide the active-filters bar's actions (전체 해제 / 스냅샷 저장),
       and disable the keyword input. Restore mode via "← 목록으로". */
    .split[data-mode="result"] .active-filters__actions,
    .split[data-mode="result"] .filter-chip__remove {
      display: none !important;
    }
    .split[data-mode="result"] [data-filter-source],
    .split[data-mode="result"] .kw-chip,
    .split[data-mode="result"] .topic-table__filter,
    .split[data-mode="result"] #kw-input,
    .split[data-mode="result"] #kw-add-btn {
      pointer-events: none;
      opacity: 0.85;
    }
    .split[data-mode="result"] .active-filters {
      border-style: solid;
    }

    /* RESULT MODE — clean panel view: drop the filter-active ✓ marks
       and cyan highlights on bar rows / TF-IDF rows / topic filter buttons.
       The snapshot card on top already shows which filters were applied,
       so the panels themselves should look like a normal read-only chart. */
    .split[data-mode="result"] button.bar-row[data-filter-source][aria-pressed="true"],
    .split[data-mode="result"] button.bar-row[data-filter-source="quiz"][aria-pressed="true"] {
      background: transparent !important;
      border-color: transparent !important;
    }
    .split[data-mode="result"] button.bar-row[data-filter-source][aria-pressed="true"] .bar-row__label,
    .split[data-mode="result"] button.bar-row[data-filter-source="quiz"][aria-pressed="true"] .bar-row__label {
      color: var(--text-muted) !important;
    }
    .split[data-mode="result"] button.bar-row[data-filter-source][aria-pressed="true"] .bar-row__label::before {
      content: none !important;
    }
    .split[data-mode="result"] button.tfidf-row[data-filter-source][aria-pressed="true"] {
      background: transparent !important;
      border-color: transparent !important;
    }
    .split[data-mode="result"] button.tfidf-row[data-filter-source][aria-pressed="true"] .tfidf-row__keyword {
      color: var(--text-primary) !important;
      font-weight: 500 !important;
    }
    .split[data-mode="result"] button.tfidf-row[data-filter-source][aria-pressed="true"] .tfidf-row__keyword::before {
      content: none !important;
    }
    .split[data-mode="result"] .topic-table__filter[aria-pressed="true"] {
      background: transparent !important;
      border-color: var(--border-subtle) !important;
      color: var(--text-muted) !important;
    }

    /* List page — fills the viewport so the carousel sits centered. */
    .builder-list {
      min-height: calc(100vh - 200px);
    }
    .builder-list > .report-carousel { flex: 1; }

    /* Carousel — peek-style (action list pattern), full-window width.
       The carousel BREAKS OUT of .main / .split width constraints so it
       spans 100vw with arrows at the FAR screen edges. The viewport
       (also 100vw) uses a horizontal mask gradient so neighbour cards
       FADE OUT naturally toward the edges instead of being hard-clipped. */
    .report-carousel {
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      min-height: 480px;
    }
    .report-carousel__arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      z-index: 10;
    }
    .report-carousel__arrow--prev { left: 24px; }
    .report-carousel__arrow--next { right: 24px; }
    .report-carousel__arrow svg { width: 18px; height: 18px; }
    .report-carousel__arrow:hover:not(:disabled) {
      border-color: var(--analyze-border); color: var(--analyze-color);
    }
    .report-carousel__arrow:disabled {
      opacity: 0.3; cursor: not-allowed;
    }
    .report-carousel__viewport {
      width: 100%;
      max-width: none;
      overflow: hidden;
      /* Horizontal fade at edges so peek cards dissolve into the bg
         instead of being clipped by a hard line. */
      -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 14%, #000 86%, transparent 100%);
              mask-image: linear-gradient(to right, transparent 0%, #000 14%, #000 86%, transparent 100%);
    }
    .report-carousel__track {
      display: flex;
      align-items: center;
      gap: 32px;
      height: 460px;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .report-carousel__slide {
      flex-shrink: 0;
      width: 440px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s, transform 0.3s;
    }
    .report-carousel__slide:not(.is-active) {
      opacity: 0.4;
      pointer-events: none;
    }
    .report-card-large { min-height: 420px; }

    /* Active card glow — soft outer halo only (no inner radial overlay,
       so the card body stays neutral and only the surrounding bg glows). */
    .report-carousel__slide.is-active .report-card-large--saved {
      border-color: rgba(6, 182, 212, 0.26);
      box-shadow:
        0 0 40px rgba(6, 182, 212, 0.14),
        0 0 80px rgba(6, 182, 212, 0.06),
        0 4px 20px rgba(0, 0, 0, 0.25);
    }
    .report-carousel__slide.is-active .report-card-large--new {
      border-color: var(--accent-gold);
      box-shadow:
        0 0 40px rgba(252, 179, 0, 0.16),
        0 0 80px rgba(252, 179, 0, 0.06),
        0 4px 20px rgba(0, 0, 0, 0.25);
    }
    .report-card-large {
      position: relative;          /* anchor for the absolute status badge */
      width: 100%;
      border-radius: 24px;
      padding: 50px 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: center;
      color: var(--text-primary);
    }
    .report-card-large--new {
      background: linear-gradient(180deg, rgba(252,179,0,0.08), rgba(252,179,0,0.02));
      border: 2px dashed var(--analyze-border);
    }
    .report-card-large--new:hover {
      border-color: var(--accent-gold);
      background: linear-gradient(180deg, rgba(252,179,0,0.16), rgba(252,179,0,0.04));
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(252,179,0,0.18);
    }
    .report-card-large--saved {
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(18px);
    }
    .report-card-large--saved:hover {
      border-color: var(--analyze-border);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6,182,212,0.18);
    }
    /* Soft ring + halo, matching the action create-card icon style.
       Transparent fill, thin coloured border, inner+outer glow. */
    .report-card-large__icon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(252, 179, 0, 0.06);
      color: var(--accent-gold);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(252, 179, 0, 0.32);
      box-shadow:
        0 0 24px rgba(252, 179, 0, 0.28),
        inset 0 0 16px rgba(252, 179, 0, 0.10);
    }
    .report-card-large__icon svg { width: 44px; height: 44px; }
    .report-card-large__icon--saved {
      background: rgba(6, 182, 212, 0.06);
      color: var(--analyze-color);
      border: 1px solid rgba(6, 182, 212, 0.32);
      box-shadow:
        0 0 24px rgba(6, 182, 212, 0.26),
        inset 0 0 16px rgba(6, 182, 212, 0.10);
    }
    .report-card-large__title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      letter-spacing: 0.04em;
      word-break: break-word;
    }
    .report-card-large__desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 320px;
    }
    /* Status badge — pinned to the very top of the card.
       `done`    → green check + "분석 완료"
       `running` → pulsing dot + "분석 중" */
    .report-card-large__status {
      position: absolute;
      top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid;
    }
    .report-card-large__status[data-status="done"] {
      color: var(--quiz-correct);
      background: var(--quiz-correct-soft);
      border-color: rgba(34, 197, 94, 0.32);
    }
    .report-card-large__status[data-status="done"] svg {
      width: 12px; height: 12px;
    }
    .report-card-large__status[data-status="running"] {
      color: var(--accent-gold);
      background: rgba(252, 179, 0, 0.10);
      border-color: rgba(252, 179, 0, 0.32);
    }
    .report-card-large__status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-gold);
      box-shadow: 0 0 6px var(--accent-gold);
      animation: rcl-pulse 1.4s ease-in-out infinite;
    }
    @keyframes rcl-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.25); }
    }

    /* Filter chips at the bottom of each saved card.
       Each chip is split into a coloured `source` capsule (POLL/QUIZ/…)
       and a text body so the user can scan the action types at a
       glance. */
    .report-card-large__chips {
      display: flex; flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      width: 100%; max-width: 380px;
      margin-top: auto;
    }
    .report-card-large__chips-empty {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .report-card-large__chip {
      display: inline-flex; align-items: stretch;
      border-radius: 100px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      max-width: 100%;
    }
    .report-card-large__chip-source {
      padding: 4px 9px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      display: inline-flex; align-items: center;
    }
    .report-card-large__chip[data-source="poll"]       .report-card-large__chip-source { background: var(--poll-bg);       color: var(--poll-color); }
    .report-card-large__chip[data-source="quiz"]       .report-card-large__chip-source { background: var(--quiz-bg);       color: var(--quiz-color); }
    .report-card-large__chip[data-source="discussion"] .report-card-large__chip-source { background: var(--discussion-bg); color: var(--discussion-color); }
    .report-card-large__chip[data-source="follow"]     .report-card-large__chip-source { background: var(--follow-bg);     color: var(--follow-color); }
    .report-card-large__chip-text {
      padding: 4px 10px;
      font-size: 11px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 220px;
    }

    .report-carousel__dots {
      display: flex; justify-content: center; gap: 8px;
      padding: 10px 0 4px;
    }
    .report-carousel__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .report-carousel__dot[data-active="true"] {
      width: 24px;
      border-radius: 100px;
      background: var(--analyze-color);
    }

    /* When .active-filters is nested inside the create wizard card,
       drop its standalone card chrome (background / border / sticky)
       so the wizard is visually a single component. */
    .builder-create > .active-filters {
      position: static;
      background: transparent !important;
      border: none !important;
      border-radius: 0;
      padding: 0;
      backdrop-filter: none;
      box-shadow: none !important;
      gap: 12px;
    }
    .builder-create > .active-filters > .active-filters__head { display: none; }
    .builder-create > .active-filters > .active-filters__list {
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 50px;
    }
    .builder-create > .active-filters > .active-filters__actions {
      border-top: none;
      padding-top: 0;
      justify-content: flex-end;
    }

    /* ── Cross-filter card (CREATE mode) ──────────────────
       Three [data-add-state] states:
         idle, picking-action, picking-item.
       Visibility toggled via .cross-filter__row[data-when]. */
    .cross-filter {
      background: var(--bg-glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 28px;
      display: flex; flex-direction: column; gap: 20px;
      width: 100%;
    }
    @media (max-width: 600px) {
      .cross-filter { padding: 20px; gap: 16px; }
    }

    /* ── Compact cross-filter ───────────────────────────────
       Once the user has chosen an item radio (which opens the
       선지 picker .cf-sunji below), the cross-filter collapses
       to a slim chips-only summary — head + state rows are
       hidden. The user goes back via cf-sunji's "← 다시 선택"
       button, which clears pickedItemId and re-expands. */
    .cross-filter:has(+ .cf-sunji:not([hidden])) {
      padding: 14px 18px;
      gap: 0;
    }
    .cross-filter:has(+ .cf-sunji:not([hidden])) .cross-filter__head,
    .cross-filter:has(+ .cf-sunji:not([hidden])) .cross-filter__row[data-when] {
      display: none !important;
    }

    .cross-filter__head {
      display: flex; flex-direction: column; gap: 8px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .cross-filter__title {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }
    .cross-filter__title svg {
      width: 18px; height: 18px;
      color: var(--analyze-color);
    }
    .cross-filter__hint {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .cross-filter__chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      min-height: 36px;
    }
    .cross-filter__chips-empty {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      padding: 8px 0;
    }

    /* Visibility cascade for the 3 add-states. */
    .cross-filter__row[data-when] { display: none; flex-direction: column; gap: 12px; }
    .cross-filter[data-add-state="idle"]            > .cross-filter__row[data-when="idle"],
    .cross-filter[data-add-state="picking-action"]  > .cross-filter__row[data-when="picking-action"],
    .cross-filter[data-add-state="picking-item"] > .cross-filter__row[data-when="picking-item"] {
      display: flex;
    }

    /* + 필터 추가 — large dashed CTA. */
    .cross-filter__add-btn {
      align-self: stretch;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 18px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 2px dashed var(--analyze-border);
      color: var(--analyze-color);
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .cross-filter__add-btn:hover {
      background: var(--analyze-bg);
      border-color: var(--analyze-color);
      transform: translateY(-1px);
    }
    .cross-filter__add-btn svg { width: 16px; height: 16px; }

    .cross-filter__pick-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .cross-filter__pick-label {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .cross-filter__pick-cancel {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .cross-filter__pick-cancel:hover {
      color: var(--text-primary);
      background: var(--surface-soft);
    }
    .cross-filter__pick-foot {
      display: flex; justify-content: flex-end;
    }

    /* 4-way action picker. */
    .cf-action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .cf-action-tile {
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 10px;
      padding: 18px 16px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .cf-action-tile:hover {
      transform: translateY(-2px);
      border-color: var(--analyze-border);
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.12);
    }
    .cf-action-tile__icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cf-action-tile__icon svg { width: 18px; height: 18px; }
    .cf-action-tile[data-action-type="poll"]       .cf-action-tile__icon { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .cf-action-tile[data-action-type="quiz"]       .cf-action-tile__icon { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .cf-action-tile[data-action-type="discussion"] .cf-action-tile__icon { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .cf-action-tile[data-action-type="follow"]     .cf-action-tile__icon { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }
    .cf-action-tile__label {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-primary);
    }
    .cf-action-tile__count {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* Options list — checkbox rows. Stretches with content; no
       inner scroll cap so the cross-filter card grows in height. */
    .cf-options-list {
      display: flex; flex-direction: column; gap: 8px;
      padding: 4px 2px;
    }
    .cf-option {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: all 0.15s;
    }
    .cf-option:hover { border-color: var(--analyze-border); }
    .cf-option input[type="checkbox"] {
      width: 18px; height: 18px;
      flex-shrink: 0;
      accent-color: var(--analyze-color);
      cursor: pointer;
    }
    .cf-option--disabled { opacity: 0.55; cursor: not-allowed; }
    .cf-option--disabled:hover { border-color: var(--border-subtle); }
    .cf-option__body {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cf-option__title {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .cf-option__meta {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .cf-option__added {
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--quiz-correct);
      background: var(--quiz-correct-soft);
      border: 1px solid rgba(34, 197, 94, 0.32);
    }

    /* Compact chips while adding (picking-action / picking-item). */
    .cross-filter[data-add-state="picking-action"] .cross-filter__chips,
    .cross-filter[data-add-state="picking-item"] .cross-filter__chips {
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      min-height: 0;
    }
    .cross-filter[data-add-state="picking-action"] .filter-chip,
    .cross-filter[data-add-state="picking-item"] .filter-chip {
      font-size: 11px;
    }

    /* The cf-sunji card sits as a sibling of .cross-filter and is
       toggled by JS — visible whenever the user has clicked a radio
       in picking-item state. Uses the same subtle border as
       .cross-filter so the two cards read as a single workflow. */
    .cf-sunji {
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 22px;
      width: 100%;
      display: flex; flex-direction: column; gap: 14px;
      backdrop-filter: blur(18px);
    }
    .cf-sunji[hidden] { display: none; }
    .cf-sunji__head {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .cf-sunji__type-chip {
      padding: 4px 10px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      flex-shrink: 0;
    }
    .cf-sunji__type-chip[data-source="poll"]       { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .cf-sunji__type-chip[data-source="quiz"]       { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .cf-sunji__type-chip[data-source="discussion"] { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .cf-sunji__type-chip[data-source="follow"]     { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }
    .cf-sunji__title {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
    }
    .cf-sunji__list {
      display: flex; flex-direction: column; gap: 16px;
      padding: 4px 2px;
    }
    .cf-sunji__foot { display: flex; justify-content: flex-end; }

    /* Question block — title heading + nested option checkboxes. */
    .cf-question {
      display: flex; flex-direction: column; gap: 8px;
      padding: 14px 14px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }
    .cf-question__title {
      font-size: 13px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      padding-bottom: 6px;
      border-bottom: 1px dashed var(--border-subtle);
    }
    .cf-question__options {
      display: flex; flex-direction: column; gap: 4px;
    }
    /* Inline option — denser than the standalone .cf-option used in
       the radio-pick step. No background card, just the checkbox row. */
    .cf-option--inline {
      background: transparent;
      border: 1px solid transparent;
      padding: 6px 8px;
      border-radius: 8px;
    }
    .cf-option--inline:hover {
      background: var(--surface-hover);
      border-color: var(--border-subtle);
    }
    .cf-option__correct {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--quiz-correct);
      background: var(--quiz-correct-soft);
      border: 1px solid rgba(34, 197, 94, 0.32);
    }

    /* Radio variant of cf-option — single-select mode. */
    .cf-option input[type="radio"] {
      width: 18px; height: 18px;
      flex-shrink: 0;
      accent-color: var(--analyze-color);
      cursor: pointer;
    }

    /* Discussion-only — comma-separated keyword input (one chip per token). */
    .cf-keyword-block { display: flex; flex-direction: column; gap: 8px; }
    .cf-keyword-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13px;
      transition: border-color 0.15s, background 0.15s;
    }
    .cf-keyword-input::placeholder { color: var(--text-dim); }
    .cf-keyword-input:focus {
      outline: none;
      border-color: var(--discussion-color);
      background: var(--surface-hover);
    }
    .cf-keyword-hint {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* List header */
    .builder-list-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
    }
    .builder-list-head h2 {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }
    .builder-list-head__count {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }

    /* Modebar — sticky-feel top bar inside create/preview cards */
    .modebar {
      display: flex; flex-direction: column; gap: 8px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .modebar__progress {
      display: flex; gap: 6px; flex-wrap: wrap;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .modebar__step {
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
    }
    .modebar__step--active {
      background: var(--analyze-bg);
      border-color: var(--analyze-border);
      color: var(--analyze-color);
    }
    .modebar__step--done {
      background: rgba(34, 197, 94, 0.10);
      border-color: rgba(34, 197, 94, 0.32);
      color: #22c55e;
    }
    .modebar__title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .modebar__hint {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .modebar__back {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .modebar__back:hover { border-color: var(--analyze-border); color: var(--analyze-color); }

    /* Preview chip list */
    .preview-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      min-height: 56px;
      align-items: center;
    }
    .preview-chips__empty {
      font-size: 12px; font-style: italic; color: var(--text-dim);
    }
    .preview-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px 4px 5px;
      border-radius: 100px;
      font-size: 12px;
      background: var(--bg-void);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .preview-chip__source {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 100px;
    }
    .preview-chip[data-source="poll"]       .preview-chip__source { background: var(--poll-bg);       color: var(--poll-color); }
    .preview-chip[data-source="quiz"]       .preview-chip__source { background: var(--quiz-bg);       color: var(--quiz-color); }
    .preview-chip[data-source="discussion"] .preview-chip__source { background: var(--discussion-bg); color: var(--discussion-color); }
    .preview-chip__group {
      font-size: 10px; color: var(--text-muted);
    }

    /* Preview stat tiles */
    .preview-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .preview-stat {
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; gap: 4px;
    }
    .preview-stat__value {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      color: var(--analyze-color);
      line-height: 1.1;
    }
    .preview-stat__label {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Saved report card — clickable (replaces snap-card actions with one big click area) */
    .snap-card[data-clickable="true"] {
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      color: inherit;
    }
    .snap-card[data-clickable="true"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      border-color: var(--analyze-border);
    }
    .snap-card__open-hint {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--analyze-color);
      margin-top: auto;
      display: inline-flex; align-items: center; gap: 4px;
    }

    /* Empty state: large "+" card, golden dashed border */
    .builder-empty {
      align-items: center; justify-content: center;
      padding: 36px 16px;
    }
    .builder-empty__card {
      width: 360px; max-width: 100%;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(252,179,0,0.08), rgba(252,179,0,0.02));
      border: 2px dashed var(--analyze-border);
      padding: 36px 28px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .builder-empty__card:hover {
      border-color: var(--accent-gold);
      background: linear-gradient(180deg, rgba(252,179,0,0.16), rgba(252,179,0,0.04));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(252,179,0,0.18);
    }
    .builder-empty__icon {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: var(--accent-gold);
      color: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 800; line-height: 1;
      box-shadow: 0 4px 18px rgba(252,179,0,0.4);
    }
    .builder-empty__title {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }
    .builder-empty__desc {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      max-width: 260px;
    }

    /* Create wizard layout container — kept transparent so the
       cross-filter and cf-sunji read as standalone sibling cards
       (no outer cyan border / glow nesting them).
       PREVIEW mode reuses .builder-create with its own glass card
       styling, scoped via [data-state="preview"]. */
    .builder-create[data-state="create"] {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      padding: 0;
      border-radius: 0;
    }
    .builder-create[data-state="preview"] {
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(18px);
    }

    .builder-stepper {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .builder-step-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .builder-step-btn[aria-current="step"] {
      background: var(--analyze-bg);
      border-color: var(--analyze-border);
      color: var(--analyze-color);
    }
    .builder-step-btn[data-completed="true"] {
      background: rgba(34, 197, 94, 0.10);
      border-color: rgba(34, 197, 94, 0.32);
      color: #22c55e;
    }
    .builder-step-btn__num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      font-size: 10px;
    }
    .builder-step-arrow { color: var(--text-dim); font-size: 14px; }

    /* Step content panels (only the active one shows) */
    .builder-step-content { display: none; flex-direction: column; gap: 14px; }
    .builder-step-content[data-active="true"] { display: flex; }

    .builder-label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--analyze-color);
    }
    .builder-name-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700;
      outline: none; transition: all 0.15s;
    }
    .builder-name-input:focus {
      border-color: var(--analyze-border);
      box-shadow: 0 0 0 3px var(--analyze-glow);
    }
    .builder-hint {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* Inline callout (info banner inside wizard step) */
    .builder-callout {
      display: flex; gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--analyze-bg);
      border: 1px solid var(--analyze-border);
      color: var(--analyze-color);
      font-size: 12px; line-height: 1.5;
    }
    .builder-callout svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
    .builder-callout strong { color: var(--text-primary); }

    /* Snapshot grid (used in step 2 + result) */
    .snap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .snap-card {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      transition: all 0.15s;
      min-height: 160px;
    }
    .snap-card:hover { border-color: var(--analyze-border); }
    .snap-card__head {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .snap-card__name {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary); line-height: 1.3;
      flex: 1; min-width: 0;
      word-break: break-word;
    }
    .snap-card__time {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .snap-card__chips {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .snap-card__chip {
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 10px; font-weight: 600;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .snap-card__chip[data-source="poll"]       { background: var(--poll-bg);       color: var(--poll-color);       border-color: var(--poll-border); }
    .snap-card__chip[data-source="quiz"]       { background: var(--quiz-bg);       color: var(--quiz-color);       border-color: var(--quiz-border); }
    .snap-card__chip[data-source="discussion"] { background: var(--discussion-bg); color: var(--discussion-color); border-color: var(--discussion-border); }
    .snap-card__chip--more {
      background: transparent;
      color: var(--text-dim);
      border-style: dashed;
    }
    .snap-card__pseudo {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--analyze-color);
    }
    .snap-card__actions {
      display: flex; gap: 6px; margin-top: auto;
    }
    .snap-card__btn {
      flex: 1;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .snap-card__btn--restore:hover { border-color: var(--analyze-border); color: var(--analyze-color); }
    .snap-card__btn--delete:hover  { border-color: rgba(239,68,68,0.4); color: var(--accent-red); }

    /* "+" new-snapshot card — same dashed gold pattern as builder-empty */
    .snap-card--new {
      cursor: pointer;
      background: linear-gradient(180deg, rgba(252,179,0,0.06), rgba(252,179,0,0.02));
      border: 2px dashed var(--analyze-border);
      align-items: center; justify-content: center;
      text-align: center;
      gap: 10px;
      font-family: inherit;
      color: inherit;
    }
    .snap-card--new:hover {
      border-color: var(--accent-gold);
      background: linear-gradient(180deg, rgba(252,179,0,0.14), rgba(252,179,0,0.04));
      transform: translateY(-1px);
    }
    .snap-card--new__icon {
