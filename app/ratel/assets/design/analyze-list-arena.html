      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent-gold);
      color: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; line-height: 1;
      box-shadow: 0 2px 12px rgba(252,179,0,0.35);
    }
    .snap-card--new__title {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }
    .snap-card--new__desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      max-width: 180px;
    }

    /* Wizard footer actions */
    /* ── PREVIEW slide-in detail drawer ───────────────────
       Right-anchored overlay opened by clicking a preview-stat
       tile. Backdrop dims the arena; clicking it (or the close
       button) closes the drawer. */
    .detail-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(420px, 92vw);
      z-index: 60;
      background: var(--panel-bg);
      border-left: 1px solid var(--border-subtle);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.35);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex; flex-direction: column;
    }
    .detail-drawer[data-open="true"] {
      transform: translateX(0);
    }
    .detail-drawer__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .detail-drawer__title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--text-primary);
    }
    .detail-drawer__close {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .detail-drawer__close:hover { color: var(--text-primary); border-color: var(--border-strong); }
    .detail-drawer__close svg { width: 16px; height: 16px; }
    .detail-drawer__body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 32px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .detail-drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 55;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    /* Drawer body section — one per filter chip in raw-data view. */
    .dd-section {
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .dd-section:last-child { border-bottom: none; }
    .dd-section__head {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .dd-section__title {
      flex: 1; min-width: 0;
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .dd-section__count {
      flex-shrink: 0;
      padding: 2px 8px; border-radius: 100px;
      background: var(--analyze-bg);
      border: 1px solid var(--analyze-border);
      color: var(--analyze-color);
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em;
    }
    .dd-section__list {
      display: flex; flex-direction: column; gap: 6px;
    }

    /* Drawer body cell variants. */
    .dd-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }
    .dd-row__avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-hover);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
    }
    .dd-row__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .dd-row__title {
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dd-row__meta {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .dd-row__chip {
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dd-row__chip[data-source="poll"]       { background: var(--poll-bg);       color: var(--poll-color);       border: 1px solid var(--poll-border); }
    .dd-row__chip[data-source="quiz"]       { background: var(--quiz-bg);       color: var(--quiz-color);       border: 1px solid var(--quiz-border); }
    .dd-row__chip[data-source="discussion"] { background: var(--discussion-bg); color: var(--discussion-color); border: 1px solid var(--discussion-border); }
    .dd-row__chip[data-source="follow"]     { background: var(--follow-bg);     color: var(--follow-color);     border: 1px solid var(--follow-border); }

    /* Preview-stat is now a clickable button. */
    .preview-stat {
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-align: left;
    }
    .preview-stat:hover {
      transform: translateY(-1px);
      border-color: var(--analyze-border);
    }
    .preview-stat__hint {
      font-family: var(--font-display);
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--analyze-color);
      margin-top: 4px;
    }

    /* Wizard footer — pinned to the viewport bottom in CREATE/PREVIEW.
       MUST live as a direct child of .arena (NOT inside .builder-create)
       because .builder-create has backdrop-filter:blur, which would
       otherwise become the containing block for fixed descendants. */
    .builder-actions {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      display: none;
      align-items: center; justify-content: space-between;
      gap: 10px;
      padding: 14px 28px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle);
    }
    /* Visibility driven by body[data-mode] (synced in setMode). */
    body[data-mode="create"]  .builder-actions--create  { display: flex; }
    body[data-mode="preview"] .builder-actions--preview { display: flex; }
    .builder-actions__step {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .builder-actions__group { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 600px) {
      .builder-actions { padding: 12px 14px; }
    }
    /* Reserve scroll-padding so the cards aren't hidden behind the
       fixed footer when scrolled to the bottom. */
    .split[data-mode="create"],
    .split[data-mode="preview"] {
      padding-bottom: 96px;
    }

    /* Result mode — slim "선택된 교차 필터" banner; the report
       title now lives in the topbar (#arena-title), and the banner
       is purely a filter summary (label + meta + chips). */
    .builder-result {
      background: linear-gradient(180deg, rgba(252,179,0,0.06), transparent 70%),
                  var(--bg-glass);
      border: 1px solid var(--analyze-border);
      border-radius: 18px;
      padding: 16px 20px;
      backdrop-filter: blur(18px);
    }
    .builder-result__chips-row {
      display: flex; flex-direction: column; gap: 8px;
    }
    .builder-result__label {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .builder-result__head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; flex-wrap: wrap;
    }

    /* In RESULT mode, .analyze-builder is empty (its [data-state]
       children are all hidden). Hide the wrapper too so .main's
       flex gap doesn't leave a phantom row above the panels. */
    .split[data-mode="result"] > .main > .analyze-builder {
      display: none;
    }

    .builder-result__topline {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; flex-wrap: wrap;
    }
    .builder-result__title {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0;
    }
    .builder-result__title h1,
    .builder-result__head > h1 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1.2;
      word-break: break-word;
      min-width: 0;
      margin: 0;
    }
    .builder-result__badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.32);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .builder-result__title h1 {
      min-width: 0;
    }
    .builder-result__meta {
      font-family: var(--font-display);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .builder-result__intro {
      margin-top: 14px;
    }

    /* Review list (step 3) */
    .builder-review-card {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--surface-soft);
      border: 1px solid var(--border-subtle);
    }
    .builder-review-card__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .builder-review-card__chips { display: flex; flex-wrap: wrap; gap: 4px; }
  </style>
</head>
<body>
  <div class="arena">
    <!-- ───────── Topbar ───────── -->
    <header class="arena-topbar" role="banner">
      <div class="arena-topbar__left">
        <button class="back-btn" aria-label="Back" data-testid="topbar-back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <img class="arena-topbar__logo" alt="Space logo" src="https://api.dicebear.com/7.x/shapes/svg?seed=law&backgroundColor=06b6d4" />
        <nav class="breadcrumb">
          <span class="breadcrumb__item">법률 토론 그룹</span>
          <span class="breadcrumb__sep">›</span>
          <span class="breadcrumb__item">Apps</span>
          <span class="breadcrumb__sep">›</span>
          <span class="breadcrumb__item breadcrumb__current">Analyze</span>
        </nav>
        <span class="type-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/>
          </svg>
          Analyze
        </span>
        <span class="topbar-title" id="arena-title">분석 결과</span>
      </div>
    </header>

    <!-- ───────── Body: split (main only, list mode) ───────── -->
    <div class="split" data-mode="list">

      <!-- ── Main ────────────────────────────────────────── -->
      <main class="main">

        <!-- ── Analyze Builder — LIST mode only ───────────── -->
        <section class="analyze-builder" data-mode="list" id="analyze-builder">

          <!-- ── LIST mode ───────────────────────────────── -->
          <div class="builder-list" data-state="list">
            <div class="builder-list-head">
              <h2>결과 분석</h2>
              <span class="builder-list-head__count" id="report-count">0개 분석</span>
            </div>
            <p class="builder-hint">
              좌우 화살표로 분석을 넘기고, 카드를 클릭해 열어보세요. 첫 카드의 "+"는 새 분석 만들기.
            </p>

            <!-- Carousel — peek-style (action list pattern):
                 - viewport (max 720, overflow hidden) clips the track
                 - track holds ALL slides side-by-side; JS translates it
                   so the active slide sits centered, with neighbors
                   peeking dimly from L/R.
                 - "+" is always the LAST slide; saved reports are
                   inserted before it (newest at index 0). -->
            <div class="report-carousel">
              <button class="report-carousel__arrow report-carousel__arrow--prev" type="button" id="report-prev" aria-label="이전 카드" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
              </button>
              <div class="report-carousel__viewport" id="report-viewport">
                <div class="report-carousel__track" id="report-track">
                  <!-- slides rendered by JS; one .is-active at a time -->
                </div>
              </div>
              <button class="report-carousel__arrow report-carousel__arrow--next" type="button" id="report-next" aria-label="다음 카드" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>

            <div class="report-carousel__dots" id="report-dots">
              <!-- one dot per card rendered by JS -->
            </div>
          </div>

        </section>

      </main>


    </div>

  </div>

  <script>
    (function () {
      var saved = localStorage.getItem('ratel-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();


    // ── Analyze Builder — LIST mode only ─────────────────
    // Renders the report carousel (saved cards + "+ new") and wires
    // arrows / dots / keyboard nav. Saved-card click navigates to
    // ./analyze-detail-arena.html; "+" card navigates to
    // ./analyze-create-arena.html.
    (function () {
      var builder = document.getElementById('analyze-builder');
      if (!builder) return;

      // LIST carousel elements
      var reportPrev     = document.getElementById('report-prev');
      var reportNext     = document.getElementById('report-next');
      var reportViewport = document.getElementById('report-viewport');
      var reportTrack    = document.getElementById('report-track');
      var reportDots     = document.getElementById('report-dots');
      var reportCount    = document.getElementById('report-count');

      // Slide geometry — kept in sync with CSS values
      var SLIDE_WIDTH = 440;
      var SLIDE_GAP   = 28;

      // Pre-seeded demo analyses so the badge / chip styling is visible
      // in the mockup. Real data will start empty.
      var analyses = [
        {
          id: 1,
          name: '헌법 개정 의견 × 무고죄 인식 교차분석',
          status: 'done',
          createdAt: '2026.04.20',
          createdAtTime: '14:32',
          filters: [
            { source: 'poll', sourceLabel: 'Poll', label: '헌법 개정 · 기본권 강화' },
            { source: 'discussion', sourceLabel: 'Discussion', label: '비동의 강간죄 · 신고' },
          ],
        },
        {
          id: 2,
          name: '헌법 상식 정답률 × 응답 패턴',
          status: 'running',
          createdAt: '2026.04.27',
          createdAtTime: '11:08',
          filters: [
            { source: 'quiz', sourceLabel: 'Quiz', label: '헌법 기본 상식 퀴즈' },
            { source: 'poll', sourceLabel: 'Poll', label: '개헌 가치 · 자유' },
          ],
        },
      ];
      var carouselIndex = 0;

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      // ─── Carousel: build the two card variants ──────────
      function buildPlusCard() {
        var c = document.createElement('button');
        c.type = 'button';
        c.className = 'report-card-large report-card-large--new';
        c.innerHTML =
          '<span class="report-card-large__icon">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">' +
              '<line x1="12" y1="5" x2="12" y2="19"/>' +
              '<line x1="5" y1="12" x2="19" y2="12"/>' +
            '</svg>' +
          '</span>' +
          '<span class="report-card-large__title">새 분석 만들기</span>' +
          '<span class="report-card-large__desc">' +
            '교차 필터를 선택해 새 보고서를 만듭니다' +
          '</span>';
        c.addEventListener('click', function () {
          window.location.href = './analyze-create-arena.html';
        });
        return c;
      }

      function buildSavedCard(rep) {
        var c = document.createElement('button');
        c.type = 'button';
        c.className = 'report-card-large report-card-large--saved';
        c.setAttribute('data-report-id', rep.id);
        c.setAttribute('data-status', rep.status || 'done');

        // Status badge at the very top (분석중 vs 분석완료).
        var statusLabel = rep.status === 'running' ? '분석 중' : '분석 완료';
        var statusHtml =
          '<span class="report-card-large__status" data-status="' + (rep.status || 'done') + '">' +
            (rep.status === 'running'
              ? '<span class="report-card-large__status-dot"></span>'
              : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>') +
            escapeHtml(statusLabel) +
          '</span>';

        // Filter chips at the bottom.
        var chipsHtml;
        if (!rep.filters || rep.filters.length === 0) {
          chipsHtml = '<div class="report-card-large__chips"><span class="report-card-large__chips-empty">필터 없음 · 전체 데이터</span></div>';
        } else {
          var chipParts = rep.filters.map(function (f) {
            var src = (f.source || 'poll');
            return '<span class="report-card-large__chip" data-source="' + src + '">' +
                     '<span class="report-card-large__chip-source">' + escapeHtml((f.sourceLabel || src).toUpperCase()) + '</span>' +
                     '<span class="report-card-large__chip-text">' + escapeHtml(f.label || '') + '</span>' +
                   '</span>';
          });
          chipsHtml = '<div class="report-card-large__chips">' + chipParts.join('') + '</div>';
        }

        c.innerHTML =
          statusHtml +
          '<span class="report-card-large__icon report-card-large__icon--saved">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px">' +
              '<path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/>' +
            '</svg>' +
          '</span>' +
          '<span class="report-card-large__title">' + escapeHtml(rep.name) + '</span>' +
          chipsHtml;

        c.addEventListener('click', function () {
          window.location.href = './analyze-detail-arena.html';
        });
        return c;
      }

      // Position the track so the slide at carouselIndex is centered.
      function positionTrack() {
        if (!reportTrack || !reportViewport) return;
        var w = reportViewport.clientWidth;
        if (w === 0) {
          requestAnimationFrame(positionTrack);
          return;
        }
        var offset = (w / 2) - (SLIDE_WIDTH / 2) - (carouselIndex * (SLIDE_WIDTH + SLIDE_GAP));
        reportTrack.style.transform = 'translateX(' + offset + 'px)';
      }

      function renderCarousel() {
        // Layout: [analyses[0], analyses[1], ..., analyses[n-1], + card]
        var total    = analyses.length + 1;
        var plusIdx  = analyses.length;
        if (carouselIndex >= total) carouselIndex = total - 1;
        if (carouselIndex < 0)      carouselIndex = 0;

        reportTrack.innerHTML = '';
        for (var i = 0; i < total; i++) {
          var slide = document.createElement('div');
          slide.className = 'report-carousel__slide' + (i === carouselIndex ? ' is-active' : '');
          if (i === plusIdx) slide.appendChild(buildPlusCard());
          else               slide.appendChild(buildSavedCard(analyses[i]));
          reportTrack.appendChild(slide);
        }
        positionTrack();

        reportPrev.disabled = (carouselIndex === 0);
        reportNext.disabled = (carouselIndex >= total - 1);

        reportDots.innerHTML = '';
        for (var j = 0; j < total; j++) {
          var dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'report-carousel__dot';
          dot.setAttribute('data-active', j === carouselIndex ? 'true' : 'false');
          dot.setAttribute('aria-label', j === plusIdx ? '새 분석 만들기' : ('보고서 ' + (j + 1)));
          (function (idx) {
            dot.addEventListener('click', function () {
              carouselIndex = idx;
              renderCarousel();
            });
          })(j);
          reportDots.appendChild(dot);
        }

        reportCount.textContent = analyses.length + '개 분석';
      }

      // ─── Event wiring ───────────────────────────────────
      reportPrev.addEventListener('click', function () { carouselIndex--; renderCarousel(); });
      reportNext.addEventListener('click', function () { carouselIndex++; renderCarousel(); });

      // Keyboard navigation:
      //   ← / →  : prev / next card
      //   Enter / Space : open the currently visible card (or "+ new")
      document.addEventListener('keydown', function (e) {
        var t = e.target;
        if (t && t.matches && t.matches('input, textarea, [contenteditable], [contenteditable="true"]')) return;

        if (e.key === 'ArrowLeft') {
          if (carouselIndex > 0) {
            e.preventDefault();
            carouselIndex--;
            renderCarousel();
          }
        } else if (e.key === 'ArrowRight') {
          var max = analyses.length; // last index = + card
          if (carouselIndex < max) {
            e.preventDefault();
            carouselIndex++;
            renderCarousel();
          }
        } else if (e.key === 'Enter' || e.key === ' ') {
          var card = reportTrack.querySelector('.report-carousel__slide.is-active .report-card-large');
          if (card) {
            e.preventDefault();
            card.click();
          }
        }
      });

      // Reposition the track on viewport resize so the active slide stays centered.
      window.addEventListener('resize', positionTrack);

      // Initial render.
      renderCarousel();
    })();
  </script>
</body>
</html>
