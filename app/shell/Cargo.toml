[package]
name = "app-shell"
version = "0.1.0"
authors = ["hackartists <hackartists@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
common = { workspace = true }
dioxus = { workspace = true }
serde = { workspace = true }
ratel-membership = { workspace = true, optional = true }
ratel-admin = { workspace = true, optional = true }
ratel-auth = { workspace = true, optional = true }
ratel-post = { workspace = true, optional = true }
ratel-my-follower = { workspace = true, optional = true }
space-shell = { workspace = true, optional = true }
ratel-user-shell = { workspace = true, optional = true }
ratel-team-shell = { workspace = true, optional = true }
tower-sessions = { version = "0.15.0", optional = true }

web-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
serde-wasm-bindgen = { workspace = true }


[features]
default = []
bypass = ["ratel-auth?/bypass"]
web = [
  "common/web",
  "ratel-admin/web",
  "ratel-auth/web",
  "ratel-membership/web",
  "space-shell/web",
  "ratel-post/web",
  "ratel-my-follower/web",
  "ratel-user-shell/web",
  "ratel-team-shell/web",
]
desktop = [
  "common/desktop",
  "ratel-admin/desktop",
  "ratel-auth/desktop",
  "ratel-membership/desktop",
  "space-shell/desktop",
  "ratel-post/desktop",
  "ratel-my-follower/desktop",
  "ratel-user-shell/desktop",
  "ratel-team-shell/desktop",
]
mobile = [
  "common/mobile",
  "ratel-admin/mobile",
  "ratel-auth/mobile",
  "ratel-membership/mobile",
  "space-shell/mobile",
  "ratel-post/mobile",
  "ratel-my-follower/mobile",
  "ratel-user-shell/mobile",
  "ratel-team-shell/mobile",
]
server = [
  "common/server",
  "ratel-admin/server",
  "ratel-auth/server",
  "ratel-membership/server",
  "space-shell/server",
  "ratel-post/server",
  "ratel-my-follower/server",
  "ratel-user-shell/server",
  "ratel-team-shell/server",
  "tower-sessions",
]

lambda = [ "server", "common/lambda" ]

[dev-dependencies]
axum = { workspace = true }
tower = { version = "0.5" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }