[package]
name = "ratel-team-shell"
version = "0.1.0"
authors.workspace = true
edition.workspace = true

[dependencies]
dioxus = { workspace = true }
common = { workspace = true }
serde = { workspace = true }
icons = { workspace = true }
ratel-team-home = { path = "../ratel-team-home/", optional = true }
ratel-team-draft = { path = "../ratel-team-draft/", optional = true }
ratel-team-group = { path = "../ratel-team-group/", optional = true }
ratel-team-member = { path = "../ratel-team-member/", optional = true }
ratel-team-dao = { path = "../ratel-team-dao/", optional = true }
ratel-team-reward = { path = "../ratel-team-reward/", optional = true }
ratel-team-setting = { path = "../ratel-team-setting/", optional = true }

[features]
default = []
web = [
    "common/web", 
    "dioxus/web", 
    "ratel-team-home/web",
    "ratel-team-draft/web",
    "ratel-team-group/web",
    "ratel-team-member/web",
    "ratel-team-dao/web",
    "ratel-team-reward/web",
    "ratel-team-setting/web",
]
desktop = [
    "dioxus/desktop",
    "ratel-team-home/desktop",
    "ratel-team-draft/desktop",
    "ratel-team-group/desktop",
    "ratel-team-member/desktop",
    "ratel-team-dao/desktop",
    "ratel-team-reward/desktop",
    "ratel-team-setting/desktop",
]
mobile = [
    "dioxus/mobile",
    "ratel-team-home/mobile",
    "ratel-team-draft/mobile",
    "ratel-team-group/mobile",
    "ratel-team-member/mobile",
    "ratel-team-dao/mobile",
    "ratel-team-reward/mobile",
    "ratel-team-setting/mobile",
]
server = [
    "common/server", 
    "dioxus/server",
    "ratel-team-home/server",
    "ratel-team-draft/server",
    "ratel-team-group/server",
    "ratel-team-member/server",
    "ratel-team-dao/server",
    "ratel-team-reward/server",
    "ratel-team-setting/server",    
]
