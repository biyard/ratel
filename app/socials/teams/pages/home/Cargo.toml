[package]
name = "ratel-team-home"
version = "0.1.0"
authors.workspace = true
edition.workspace = true

[dependencies]
dioxus = { workspace = true }
common = { workspace = true }
serde = { workspace = true }
ratel-auth = { workspace = true, optional = true }
ratel-post = { workspace = true, optional = true }

[features]
default = []
web = ["common/web", "dioxus/web", "ratel-auth/web", "ratel-post/web"]
desktop = ["dioxus/desktop", "ratel-auth/desktop", "ratel-post/desktop"]
mobile = ["dioxus/mobile", "ratel-auth/mobile", "ratel-post/mobile"]
server = ["common/server", "dioxus/server", "ratel-auth/server", "ratel-post/server"]
