# The iOS build runs `cargo` from an Xcode build phase (`cargo tauri ios
# xcode-script`) whose environment is sanitized by xcodebuild and does NOT
# inherit shell env vars. That makes the compile-time
# `option_env!("GOOGLE_OAUTH_CLIENT_ID")` in src/commands/google_sign_in.rs
# evaluate to `None` and panic. Provide a default here so iOS builds compile.
#
# `force = false` → any explicitly-set env var wins (the Android build sets
# this via Gradle, and an explicit `GOOGLE_OAUTH_CLIENT_ID=… cargo …` still
# overrides). Replace the value with the real iOS OAuth client id before
# shipping a build that needs Google Sign-In on iOS.
[env]
GOOGLE_OAUTH_CLIENT_ID = { value = "000000000000-placeholder.apps.googleusercontent.com", force = false }
