[package]
name = "ratel-tauri"
version = "0.1.0"
edition = "2024"
authors = ["Biyard"]
description = "Ratel Tauri Android shell"
publish = false

[lib]
name = "ratel_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde_json = { workspace = true }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
# Native Google Sign In: Android Credential Manager + Google
# AuthorizationClient. Reads OAuth client_id from the web bundle (the
# bundle passes it as a sign_in() argument, extracted at compile time
# from src-tauri/google-services.json by app/ratel/build.rs).
tauri-plugin-google-auth = "0.5.1"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Share request/response DTOs with the web bundle. tauri-types compiles only
# the DTO modules — no dioxus, no reqwest, no other runtime deps.
app-shell = { path = "../../ratel", default-features = false, features = ["tauri-types"] }
