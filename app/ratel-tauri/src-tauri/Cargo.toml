[package]
name = "ratel-tauri"
version = "0.1.0"
edition = "2024"
authors = ["Biyard"]
description = "Ratel Tauri Android shell"
publish = false

[lib]
name = "ratel_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "=2.9.5", features = [] }
# Pin tauri-runtime to 2.9.2 which matches tauri-runtime-wry 2.9.3.
# tauri-runtime 2.11.x has a new eval_script_with_callback API that
# tauri-runtime-wry 2.9.3 does not implement, causing a compile error.
tauri-runtime = "=2.9.2"
tauri-runtime-wry = "=2.9.3"
tauri-plugin-opener = "2"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# Share request/response DTOs with the web bundle. tauri-types compiles only
# the DTO modules — no dioxus, no reqwest, no other runtime deps.
app-shell = { path = "../../ratel", default-features = false, features = ["tauri-types"] }
