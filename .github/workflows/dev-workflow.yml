name: Dev deploy

on:
  push:
    branches:
      - dev

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [ratel-app, ratel-app-lambda]
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      # - name: Write Firebase service account (dev)
      #   run: |
      #     mkdir -p cdk/app-shell/.gcp
