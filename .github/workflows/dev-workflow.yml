      #       | base64 -d > cdk/main-api/.gcp/firebase-service-account.json

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      - name: Deploy
        env:
          ENV: dev
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DOMAIN: dev.ratel.foundation
          STACK: ratel-dev-stack
          DEPLOY_STORYBOOK: false
          DEPLOY_STATIC: false
          HIGH_TRAFFIC_REGION: ap-northeast-2

          QDRANT_API_KEY: ${{secrets.DEV_QDRANT_API_KEY }}
        run: |
          npm i -g aws-cdk
          make cdk-deploy-v2

