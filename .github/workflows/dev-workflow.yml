  #           canister-${{ runner.os }}-
  #         path: ../../target

  #     - name: Setup dfx identity
  #       env:
  #         DFX_IDENTITY_PEM_BASE64: ${{ secrets.DFX_IDENTITY_PEM_BASE64 }}
  #       run: |
  #         echo "$DFX_IDENTITY_PEM_BASE64" | base64 -d > /tmp/identity.pem
