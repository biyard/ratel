  ratel-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Restore cache
        id: app-shell-build-cache
        uses: actions/cache/restore@v5
        with:
          key: app-shell-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ratel-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Building APIs
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISABLE_ANSI: true

          ENV: dev
          RUST_LOG: info
          SERVICE: app-shell
          DOMAIN: dev.ratel.foundation
          BUCKET_NAME: metadata.ratel.foundation
          SLACK_HOOK: ${{ secrets.DEV_SLACK }}

          BINANCE_API_KEY: ${{ secrets.DEV_BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.DEV_BINANCE_SECRET_KEY }}
          BINANCE_WEBHOOK: https://api.dev.ratel.foundation/v2/binances/webhooks
          REDIRECT_DOMAIN: https://dev.ratel.foundation

          KAIA_ENDPOINT: https://public-en-kairos.node.kaia.io
          KAIA_ARCHIVE_ENDPOINT: https://archive-en-kairos.node.kaia.io
          BLOCK_EXPLORER_URL: https://kairos.kaiascan.io
          KAIA_FEEPAYER_KEY: ${{ secrets.DEV_KAIA_KEY }}
          KAIA_FEEPAYER_ADDR: ${{ secrets.DEV_KAIA_ADDR }}
          KAIA_OWNER_KEY: ${{ secrets.DEV_KAIA_KEY }}
          KAIA_OWNER_ADDR: ${{ secrets.DEV_KAIA_ADDR }}

          TELEGRAM_TOKEN: ${{ secrets.DEV_TELEGRAM_TOKEN }}

          BBS_BLS_X: ${{ secrets.BBS_BLS_X }}
          BBS_BLS_Y: ${{ secrets.BBS_BLS_Y }}
          BBS_BLS_D: ${{ secrets.BBS_BLS_D }}
          BBS_BLS_CRV: ${{ secrets.BBS_BLS_CRV }}

          P256_X: ${{ secrets.P256_X }}
          P256_Y: ${{ secrets.P256_Y }}
          P256_D: ${{ secrets.P256_D }}
          P256_CRV: ${{ secrets.P256_CRV }}

          DYNAMO_TABLE_PREFIX: ratel-dev
          DYNAMO_ENDPOINT: none
          # RUST_FLAG: "--features lambda --release"
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

          FCM_ENABLED: true
          RATEL_PROJECT_ID: ${{ secrets.RATEL_PROJECT_ID }}
          REWARD: true

          BEDROCK_AGENT_ID: ${{ secrets.DEV_BEDROCK_AGENT_ID }}
          BEDROCK_AGENT_ALIAS_ID: ${{ secrets.DEV_BEDROCK_AGENT_ALIAS_ID }}

          BIYARD_API_KEY: ${{ secrets.DEV_BIYARD_API_KEY }}
          BIYARD_PROJECT_ID: ${{ secrets.DEV_BIYARD_PROJECT_ID }}

          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

          PORTONE_STORE_ID: ${{ secrets.DEV_PORTONE_STORE_ID}}
          PORTONE_INICIS_CHANNEL_KEY: ${{ secrets.DEV_PORTONE_INICIS_CHANNEL_KEY }}
          PORTONE_API_SECRET: ${{ secrets.DEV_PORTONE_API_SECRET }}
          PORTONE_KPN_CHANNEL_KEY: ${{ secrets.DEV_PORTONE_KPN_CHANNEL_KEY }}

          QDRANT_URL: ${{ secrets.DEV_QDRANT_URL }}
          QDRANT_API_KEY: ${{secrets.DEV_QDRANT_API_KEY }}

          ECR: ${{ steps.ratel-ecr.outputs.registry }}/ratel/app-shell

          WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}

          RATEL_CANISTER_ID: lqy7q-dh777-77777-aaaaq-cai
          IC_URL: https://icp.dev.biyard.co
          ICP_IDENTITY_PEM: ${{ secrets.DEV_ICP_IDENTITY_PEM }}
          VOTER_TAG_SECRET: ${{ secrets.DEV_VOTER_TAG_SECRET }}
          ATTR_VOTING_AUTHORITY_JSON: ${{ secrets.DEV_ATTR_VOTING_AUTHORITY_JSON }}
        run: |
          npm i
          rm -rf target/dx

          cd app/ratel

          make build
          make docker
          make docker.push

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: app-shell-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin
            target

      - name: Deploy to S3
        env:
          BUCKET: ${{ secrets.DEV_RATEL_BUCKET }}
          CDN: ${{ secrets.DEV_RATEL_CDN }}
        run: |
          aws s3 sync target/dx/app-shell/release/web/public $BUCKET
          aws cloudfront create-invalidation --distribution-id $CDN --paths "/*"
          tar czvf app-shell.tar.gz target/dx/app-shell/release/web

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-shell-${{ github.sha }}
          path: ${{ github.workspace }}/app-shell.tar.gz
          if-no-files-found: error
          retention-days: 7

  ratel-app-lambda:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Restore cache
        id: app-shell-build-cache
        uses: actions/cache/restore@v5
        with:
          key: app-shell-lambda-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-lambda-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ratel-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Building APIs
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISABLE_ANSI: true

          ENV: dev
          RUST_LOG: info
          SERVICE: app-shell
          DOMAIN: dev.ratel.foundation
          BUCKET_NAME: metadata.ratel.foundation
          SLACK_HOOK: ${{ secrets.DEV_SLACK }}

          BINANCE_API_KEY: ${{ secrets.DEV_BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.DEV_BINANCE_SECRET_KEY }}
          BINANCE_WEBHOOK: https://api.dev.ratel.foundation/v2/binances/webhooks
          REDIRECT_DOMAIN: https://dev.ratel.foundation

          KAIA_ENDPOINT: https://public-en-kairos.node.kaia.io
          KAIA_ARCHIVE_ENDPOINT: https://archive-en-kairos.node.kaia.io
          BLOCK_EXPLORER_URL: https://kairos.kaiascan.io
          KAIA_FEEPAYER_KEY: ${{ secrets.DEV_KAIA_KEY }}
          KAIA_FEEPAYER_ADDR: ${{ secrets.DEV_KAIA_ADDR }}
          KAIA_OWNER_KEY: ${{ secrets.DEV_KAIA_KEY }}
          KAIA_OWNER_ADDR: ${{ secrets.DEV_KAIA_ADDR }}

          TELEGRAM_TOKEN: ${{ secrets.DEV_TELEGRAM_TOKEN }}

          BBS_BLS_X: ${{ secrets.BBS_BLS_X }}
          BBS_BLS_Y: ${{ secrets.BBS_BLS_Y }}
          BBS_BLS_D: ${{ secrets.BBS_BLS_D }}
          BBS_BLS_CRV: ${{ secrets.BBS_BLS_CRV }}

          P256_X: ${{ secrets.P256_X }}
          P256_Y: ${{ secrets.P256_Y }}
          P256_D: ${{ secrets.P256_D }}
          P256_CRV: ${{ secrets.P256_CRV }}

          DYNAMO_TABLE_PREFIX: ratel-dev
          DYNAMO_ENDPOINT: none
          # RUST_FLAG: "--features lambda --release"
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

          FCM_ENABLED: true
          RATEL_PROJECT_ID: ${{ secrets.RATEL_PROJECT_ID }}
          REWARD: true

          BEDROCK_AGENT_ID: ${{ secrets.DEV_BEDROCK_AGENT_ID }}
          BEDROCK_AGENT_ALIAS_ID: ${{ secrets.DEV_BEDROCK_AGENT_ALIAS_ID }}

          BIYARD_API_KEY: ${{ secrets.DEV_BIYARD_API_KEY }}
          BIYARD_PROJECT_ID: ${{ secrets.DEV_BIYARD_PROJECT_ID }}

          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

          PORTONE_STORE_ID: ${{ secrets.DEV_PORTONE_STORE_ID}}
          PORTONE_INICIS_CHANNEL_KEY: ${{ secrets.DEV_PORTONE_INICIS_CHANNEL_KEY }}
          PORTONE_API_SECRET: ${{ secrets.DEV_PORTONE_API_SECRET }}
          PORTONE_KPN_CHANNEL_KEY: ${{ secrets.DEV_PORTONE_KPN_CHANNEL_KEY }}

          QDRANT_URL: ${{ secrets.DEV_QDRANT_URL }}
          QDRANT_API_KEY: ${{secrets.DEV_QDRANT_API_KEY }}

          ECR: ${{ steps.ratel-ecr.outputs.registry }}/ratel/app-shell-lambda

          WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}

          RATEL_CANISTER_ID: lqy7q-dh777-77777-aaaaq-cai
          IC_URL: https://icp.dev.biyard.co
          ICP_IDENTITY_PEM: ${{ secrets.DEV_ICP_IDENTITY_PEM }}
          VOTER_TAG_SECRET: ${{ secrets.DEV_VOTER_TAG_SECRET }}
          ATTR_VOTING_AUTHORITY_JSON: ${{ secrets.DEV_ATTR_VOTING_AUTHORITY_JSON }}
        run: |
          npm i
          rm -rf target/dx

          cd app/ratel
          make build-lambda
          make docker
          make docker.push

      - name: Deploy to S3
        env:
          BUCKET: ${{ secrets.DEV_RATEL_BUCKET }}
          CDN: ${{ secrets.DEV_RATEL_CDN }}
        run: |
          aws s3 sync target/dx/app-shell/release/web/public $BUCKET
          aws cloudfront create-invalidation --distribution-id $CDN --paths "/*"
          tar czvf app-shell-lambda.tar.gz target/dx/app-shell/release/web

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-shell-lambda-${{ github.sha }}
          path: ${{ github.workspace }}/app-shell-lambda.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: app-shell-lambda-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin
            target

