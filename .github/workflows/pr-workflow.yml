name: PR Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  space-stream-worker:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packages/space-stream-worker

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable

      - name: Build space-stream-worker
        env:
          AWS_ACCOUNT_ID: 000000000000
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          ENV: test
          DOMAIN: dev.ratel.foundation
          DYNAMO_TABLE_PREFIX: ratel-test
          DYNAMO_ENDPOINT: http://localhost:4566
          PRIVATE_BUCKET_NAME: metadata.ratel.foundation
        run: |
          cargo build --release

  contracts-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm ci

      - name: Run contract tests
        run: |
          make test

  survey-worker-lambda:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: packages/survey-worker

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable

      - name: Build survey-worker Lambda
        env:
          ENV: test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          DYNAMO_TABLE_PREFIX: ratel-local
          DYNAMO_ENDPOINT: http://localhost:4566
          BUCKET_NAME: metadata.ratel.foundation
          ASSET_DIR: metadata
          BUCKET_EXPIRE: 3600
          S3_REGION: us-east-1
        run: |
          cargo build --release

  fetcher:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          target: wasm32-unknown-unknown
          toolchain: stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: cargo-bins/cargo-binstall@main
      - name: Install dependencies
        run: |
          cargo binstall toml-cli

      - name: Build and cache Docker image
        id: build
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: test
          SECRET_ACCESS_KEY: test
          ENV: dev
          RUST_LOG: info
          SERVICE: fetcher
          DOMAIN: fetcher-api.dev.ratel.foundation
          AUTH_DOMAIN: dev.ratel.foundation
          DATABASE_TYPE: postgres
          BASE_DOMAIN: ratel.foundation
          REPO_NAME: ratel/fetcher
          ECR_NAME: fetcher
          COMMIT: pr-${{ github.sha }}
          DYNAMO_TABLE_PREFIX: ratel-local
        run: |
          npm i -g aws-cdk
          cd packages/fetcher
          # Build and tag image
          make docker.build

          # Save image to cache
          docker save $ECR_NAME:$COMMIT | gzip > /tmp/fetcher-image.tar.gz
          echo "image=$ECR_NAME:$COMMIT" >> $GITHUB_OUTPUT

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          path: /tmp/fetcher-image.tar.gz
          key: fetcher-image-${{ github.sha }}

  ratel-app-shell:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/shell

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force


      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Building test
        id: build
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          ENV: local
          RUSTFLAGS: "-D warnings"
          RUST_LOG: info
          DYNAMO_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          COMMIT: pr-${{ github.sha }}
        run: |
          make build
          make docker

          # Save image for artifact upload
          docker save ratel:$COMMIT | gzip > /tmp/app-shell-image.tar.gz
          echo "image=ratel:$COMMIT" >> $GITHUB_OUTPUT

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-shell-docker-image
          path: /tmp/app-shell-image.tar.gz
          retention-days: 7

  ratel-app-shell-testing:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/shell

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable

      - name: Start infrastructure
        working-directory: .
        run: |
          docker compose --profile infra up -d --wait

      - name: Run tests
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          DYNAMO_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          RUST_LOG: info
          ENV: local
        run: |
          make test

