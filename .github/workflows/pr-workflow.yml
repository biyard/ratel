name: PR Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  space-stream-worker:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: packages/space-stream-worker

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          cache: false

      - name: Build space-stream-worker
        env:
          AWS_ACCOUNT_ID: 000000000000
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          ENV: test
          DOMAIN: dev.ratel.foundation
          DYNAMO_TABLE_PREFIX: ratel-test
          DYNAMO_ENDPOINT: http://localhost:4566
          PRIVATE_BUCKET_NAME: metadata.ratel.foundation
        run: |
          cargo build --release

  contracts-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm ci

      - name: Run contract tests
        run: |
          make test

  survey-worker-lambda:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: packages/survey-worker

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          cache: false

      - name: Build survey-worker Lambda
        env:
          ENV: test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          DYNAMO_TABLE_PREFIX: ratel-local
          DYNAMO_ENDPOINT: http://localhost:4566
          BUCKET_NAME: metadata.ratel.foundation
          ASSET_DIR: metadata
          BUCKET_EXPIRE: 3600
          S3_REGION: us-east-1
        run: |
          cargo build --release

  fetcher:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          target: wasm32-unknown-unknown
          toolchain: stable
          cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: cargo-bins/cargo-binstall@main
      - name: Install dependencies
        run: |
          cargo binstall toml-cli

      - name: Build and cache Docker image
        id: build
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: test
          SECRET_ACCESS_KEY: test
          ENV: dev
          RUST_LOG: info
          SERVICE: fetcher
          DOMAIN: fetcher-api.dev.ratel.foundation
          AUTH_DOMAIN: dev.ratel.foundation
          DATABASE_TYPE: postgres
          BASE_DOMAIN: ratel.foundation
          REPO_NAME: ratel/fetcher
          ECR_NAME: fetcher
          COMMIT: pr-${{ github.sha }}
          DYNAMO_TABLE_PREFIX: ratel-local
        run: |
          npm i -g aws-cdk
          cd packages/fetcher
          # Build and tag image
          make docker.build

          # Save image to cache
          docker save $ECR_NAME:$COMMIT | gzip > /tmp/fetcher-image.tar.gz
          echo "image=$ECR_NAME:$COMMIT" >> $GITHUB_OUTPUT

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          path: /tmp/fetcher-image.tar.gz
          key: fetcher-image-${{ github.sha }}

  dx-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/ratel

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Building test
        id: build
        run: |
          dx check --web

  ratel-app:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/ratel

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Building test
        id: build
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          ENV: local
          RUSTFLAGS: "-D warnings"
          RUST_LOG: info
          DYNAMO_ENDPOINT: http://localstack:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ACCOUNT_ID: test
          COMMIT: pr-${{ github.sha }}
          ECR: ratel/app-shell
        run: |
          npm i -D tailwindcss
          make build
          make docker

          # Save image for artifact upload
          docker save $ECR:$COMMIT | gzip > /tmp/app-shell-image.tar.gz
          echo "image=$ECR:$COMMIT" >> $GITHUB_OUTPUT

      # - name: Setup SSH session with tmate
      #   uses: mxschmitt/action-tmate@v3
      #   if: failure()
      #   timeout-minutes: 15
      #   env:
      #     DYNAMO_TABLE_PREFIX: ratel-local
      #     ENV: local
      #     RUSTFLAGS: "-D warnings"
      #     RUST_LOG: info
      #     DYNAMO_ENDPOINT: http://localstack:4566
      #     AWS_ACCESS_KEY_ID: test
      #     AWS_SECRET_ACCESS_KEY: test
      #     AWS_REGION: us-east-1
      #     AWS_ACCOUNT_ID: test
      #     COMMIT: pr-${{ github.sha }}
      #     ECR: ratel/app-shell
      #   with:
      #     limit-access-to-actor: true

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-shell-image-${{ github.sha }}
          path: /tmp/app-shell-image.tar.gz
          retention-days: 7

  ratel-app-testing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Start infrastructure
        run: |
          make infra

      - name: Run tests
        working-directory: app/ratel
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          DYNAMO_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ACCOUNT_ID: test
          RUST_LOG: info
          ENV: local
        run: |
          npm install -D tailwindcss @tailwindcss/cli
          make test

      # - name: Setup SSH session with tmate
      #   uses: mxschmitt/action-tmate@v3
      #   if: failure()
      #   timeout-minutes: 15
      #   env:
      #     DYNAMO_TABLE_PREFIX: ratel-local
      #     DYNAMO_ENDPOINT: http://localhost:4566
      #     AWS_ACCESS_KEY_ID: test
      #     AWS_SECRET_ACCESS_KEY: test
      #     AWS_REGION: us-east-1
      #     AWS_ACCOUNT_ID: test
      #     RUST_LOG: info
      #     ENV: local
      #   with:
      #     limit-access-to-actor: true

  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ratel-app]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-shell-image-${{ github.sha }}
          path: /tmp

      - name: Load Docker images
        run: |
          # Load images from cache
          docker load < /tmp/app-shell-image.tar.gz

          docker images

      - name: Setup test environment
        env:
          COMMIT: pr-${{ github.sha }}
        run: |
          docker-compose --profile testing up -d

      - name: Wait for services to be ready
        run: |
          # Check service health with retry loop and timeout
          echo "Waiting for services to be ready..."

          # Wait for Main API (180 second timeout for container startup)
          echo "🔄 Checking Main API..."
          timeout=180
          interval=10
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -f -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ App Shell is responding (took ${elapsed}s)"
              break
            fi
            echo "⏳ App Shell not ready yet... (${elapsed}/${timeout}s)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "❌ App Shell failed to respond with 200 status within ${timeout}s"
            echo "🔍 Checking Docker services status:"
            docker-compose -f docker-compose.yaml ps
            echo "🔍 App Shell logs:"
            docker-compose -f docker-compose.yaml logs app-shell-testing
            exit 1
          fi

          echo "🎉 All services are ready!"

      - name: Install dependencies
        working-directory: playwright
        run: npm i

      - name: Install Playwright Browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          PLAYWRIGHT_TIMEOUT: 5000
        working-directory: playwright
        run: |
          make test

      # - name: Setup SSH session with tmate
      #   uses: mxschmitt/action-tmate@v3
      #   if: failure()
      #   timeout-minutes: 15
      #   env:
      #     COMMIT: pr-${{ github.sha }}
      #   with:
      #     limit-access-to-actor: true

      - name: Move Playwright Tests
        if: always()
        run: |
          mv playwright/playwright-report ./

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            playwright-report/
          retention-days: 30
