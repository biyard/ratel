name: PR Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm ci

      - name: Run contract tests
        run: |
          make test

  dx-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/ratel

    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: dx-check-cache
        uses: actions/cache/restore@v4
        with:
          key: app-shell-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Building test
        id: build
        env:
          RUSTFLAGS: "-D warnings"
        run: |
          dx check --web
          dx check --ios
          dx check --android

  ratel-app:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: app-shell-build-cache
        uses: actions/cache/restore@v4
        with:
          key: app-shell-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Building test
        id: build
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          ENV: local
          RUSTFLAGS: "-D warnings"
          RUST_LOG: error
          DYNAMO_ENDPOINT: http://localstack:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: test
          COMMIT: pr-${{ github.sha }}
          ECR: ratel/app-shell
        run: |
          npm i
          rm -rf target/dx

          cd app/ratel
          make build-testing
          make docker

          # Save image for artifact upload
          docker save $ECR:$COMMIT | gzip > /tmp/app-shell-image.tar.gz
          echo "image=$ECR:$COMMIT" >> $GITHUB_OUTPUT

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-shell-image-${{ github.sha }}
          path: /tmp/app-shell-image.tar.gz
          retention-days: 7

  ratel-app-testing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: app-shell-build-cache
        uses: actions/cache/restore@v4
        with:
          key: app-shell-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          toolchain: stable
          target: wasm32-unknown-unknown
          cache: false

      - uses: cargo-bins/cargo-binstall@main
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Install Dioxus-cli
        run: |
          cargo binstall dioxus-cli --force

      - name: Start infrastructure
        run: |
          docker compose --profile infra up -d localstack qdrant
          echo "Waiting for LocalStack to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do sleep 5; done'
          echo "LocalStack is healthy, starting remaining services..."
          docker compose --profile infra up -d --remove-orphans

      - name: Run tests
        working-directory: app/ratel
        env:
          DYNAMO_TABLE_PREFIX: ratel-local
          DYNAMO_ENDPOINT: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: test
          RUST_LOG: info
          ENV: local
        run: |
          npm i
          make test

  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ratel-app]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-shell-image-${{ github.sha }}
          path: /tmp

      - name: Load Docker images
        run: |
          # Load images from cache
          docker load < /tmp/app-shell-image.tar.gz

          docker images

      - name: Setup test environment
        env:
          COMMIT: pr-${{ github.sha }}
          RESET_DB: "true"
        run: |
          docker compose --profile testing up -d localstack qdrant
          echo "Waiting for LocalStack to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do sleep 5; done'
          echo "LocalStack is healthy, starting remaining services..."
          docker compose --profile testing up -d

      - name: Wait for services to be ready
        run: |
          # Check service health with retry loop and timeout
          echo "Waiting for services to be ready..."

          # Wait for Main API (180 second timeout for container startup)
          echo "🔄 Checking Main API..."
          timeout=180
          interval=10
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -f -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "✅ App Shell is responding (took ${elapsed}s)"
              break
            fi
            echo "⏳ App Shell not ready yet... (${elapsed}/${timeout}s)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "❌ App Shell failed to respond with 200 status within ${timeout}s"
            echo "🔍 Checking Docker services status:"
            docker compose ps
            echo "🔍 App Shell logs:"
            docker compose logs app-shell-testing
            exit 1
          fi

          echo "🎉 All services are ready!"

      - name: Install dependencies
        working-directory: playwright
        run: npm i

      - name: Install Playwright Browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          PLAYWRIGHT_TIMEOUT: 60000
        working-directory: playwright
        run: |
          make test

      - name: Move Playwright Tests
        if: always()
        run: |
          mv playwright/playwright-report ./

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            playwright-report/
          retention-days: 30
