name: Production deploy

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [ratel-app-lambda]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Download lambda artifact
        uses: actions/download-artifact@v5
        with:
          name: app-shell-lambda-${{ github.sha }}
          path: /tmp/lambda

      # Extract bootstrap + public/ into cdk/.build/app-shell so that
      # `lambda.Code.fromAsset(".build/app-shell")` in regional-lambda-stack.ts
      # sees both. CDK re-zips this directory as the Lambda deployment bundle.
      - name: Extract lambda package
        run: |
          set -euo pipefail
          rm -rf cdk/.build/app-shell
          mkdir -p cdk/.build/app-shell
          unzip -o /tmp/lambda/app-shell-lambda.zip -d cdk/.build/app-shell
          chmod +x cdk/.build/app-shell/bootstrap
          ls -la cdk/.build/app-shell

      # FCM push: inject the Firebase service-account key (SECRET) into the
      # lambda bundle at the runtime-read path
      # (GOOGLE_APPLICATION_CREDENTIALS=.gcp/firebase-service-account.json).
      # After extract (rm -rf), before deploy (CDK zips the dir). Guarded so a
      # missing secret just disables push (fcm.rs skips gracefully).
      - name: Write Firebase service account into lambda bundle
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" ]; then
            mkdir -p cdk/.build/app-shell/.gcp
            echo "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d \
              > cdk/.build/app-shell/.gcp/firebase-service-account.json
            echo "firebase service account written ($(wc -c < cdk/.build/app-shell/.gcp/firebase-service-account.json) bytes)"
          else
            echo "FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 not set — push disabled (graceful skip)"
          fi

      - name: Deploy
        env:
          ENV: prod
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DOMAIN: ratel.foundation
          STACK: ratel-prod-stack
          DEPLOY_STORYBOOK: false
          DEPLOY_STATIC: false
          HIGH_TRAFFIC_REGION: ap-northeast-2

          # Launchpad partner config → injected into the Lambda RUNTIME env by
          # cdk/bin/cdk.ts (read via std::env::var at runtime, no rebuild needed).
          LAUNCHPAD_BASE_URL: ${{ secrets.LAUNCHPAD_BASE_URL }}
          LAUNCHPAD_PROJECT_ID: ${{ secrets.LAUNCHPAD_PROJECT_ID }}
          LAUNCHPAD_PARTNER_SECRET: ${{ secrets.LAUNCHPAD_PARTNER_SECRET }}
          LAUNCHPAD_POINT_SYMBOL: RT
        run: |
          npm i -g aws-cdk
          make cdk-deploy-v2

  ratel-app-lambda:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ratel-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Restore cache
        id: app-shell-build-cache
        uses: actions/cache/restore@v5
        with:
          key: app-shell-lambda-build-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            app-shell-lambda-build-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target

      - name: Building APIs
        env:
          REGION: ap-northeast-2
          ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISABLE_ANSI: true

          ENV: prod
          RUST_LOG: error
          SERVICE: app-shell
          DOMAIN: ratel.foundation
          BUCKET_NAME: metadata.ratel.foundation
          SLACK_HOOK: ${{ secrets.SLACK_HOOK }}

          BINANCE_API_KEY: ${{ secrets.PROD_BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.PROD_BINANCE_SECRET_KEY }}
          BINANCE_WEBHOOK: https://api.ratel.foundation/v2/binances/webhooks
          REDIRECT_DOMAIN: https://ratel.foundation

          KAIA_ENDPOINT: https://public-en.node.kaia.io
          KAIA_ARCHIVE_ENDPOINT: https://archive-en.node.kaia.io
          KAIA_FEEPAYER_KEY: ${{ secrets.PROD_KAIA_FEEPAYER_KEY }}
          KAIA_FEEPAYER_ADDR: ${{ secrets.PROD_KAIA_FEEPAYER_ADDR }}
          KAIA_OWNER_KEY: ${{ secrets.PROD_KAIA_OWNER_KEY }}
          KAIA_OWNER_ADDR: ${{ secrets.PROD_KAIA_OWNER_KEY_ADDR }}

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

          BBS_BLS_X: ${{ secrets.BBS_BLS_X }}
          BBS_BLS_Y: ${{ secrets.BBS_BLS_Y }}
          BBS_BLS_D: ${{ secrets.BBS_BLS_D }}
          BBS_BLS_CRV: ${{ secrets.BBS_BLS_CRV }}

          P256_X: ${{ secrets.P256_X }}
          P256_Y: ${{ secrets.P256_Y }}
          P256_D: ${{ secrets.P256_D }}
          P256_CRV: ${{ secrets.P256_CRV }}

          DYNAMO_TABLE_PREFIX: ratel-prod
          DYNAMO_ENDPOINT: none
          # RUST_FLAG: "--features lambda --release"
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

          # NOTE: Change PORTONE API
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          PORTONE_KPN_CHANNEL_KEY: ${{ secrets.PORTONE_KPN_BILLING_KEY_CHANNEL_KEY }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_INICIS_CHANNEL_KEY: ${{ secrets.PROD_PORTONE_INICIS_CHANNEL_KEY }}

          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{secrets.QDRANT_API_KEY }}

          ECR: ${{ steps.ratel-ecr.outputs.registry }}/ratel/app-shell-lambda

          WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}

          # ICP encrypted voting — point at the prod canister on IC mainnet.
          # Reusing DEV_ICP_IDENTITY_PEM until a dedicated prod identity is provisioned.
          RATEL_CANISTER_ID: 5wtzb-piaaa-aaaap-qhjfq-cai
          IC_URL: https://icp0.io
          ICP_IDENTITY_PEM: ${{ secrets.DEV_ICP_IDENTITY_PEM }}
          VOTER_TAG_SECRET: ${{ secrets.VOTER_TAG_SECRET }}
          ATTR_VOTING_AUTHORITY_JSON: ${{ secrets.ATTR_VOTING_AUTHORITY_JSON }}

          # Cross-posting credential AEAD key (envvar form: "v<int>:<base64-no-pad 32 bytes>").
          # Backup of the value is held in 1Password (admin-only vault) — losing
          # this secret without the backup makes every stored connection
          # unrecoverable. PREVIOUS is set only during a key rotation transition.
          CROSS_POSTING_DATA_KEY: ${{ secrets.PROD_CROSS_POSTING_DATA_KEY }}
          CROSS_POSTING_DATA_KEY_PREVIOUS: ${{ secrets.PROD_CROSS_POSTING_DATA_KEY_PREVIOUS }}

          # LinkedIn OAuth (Phase 1B). Two values from the LinkedIn Developer
          # Portal → app → "Auth" tab. CLIENT_ID is public-ish (gets sent in
          # the redirect URL), CLIENT_SECRET is server-only and used during
          # the token-exchange POST.
          LINKEDIN_CLIENT_ID: ${{ secrets.PROD_LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.PROD_LINKEDIN_CLIENT_SECRET }}
          LAUNCHPAD_BASE_URL: ${{ secrets.LAUNCHPAD_BASE_URL }}
          LAUNCHPAD_PROJECT_ID: ${{ secrets.LAUNCHPAD_PROJECT_ID }}
          LAUNCHPAD_PARTNER_SECRET: ${{ secrets.LAUNCHPAD_PARTNER_SECRET }}
          LAUNCHPAD_POINT_SYMBOL: RT
        run: |
          rm -rf target/dx

          cd app/ratel
          make build-lambda

      - name: Deploy to S3
        env:
          BUCKET: ${{ secrets.PROD_RATEL_BUCKET }}
          CDN: ${{ secrets.PROD_RATEL_CDN }}
        run: |
          aws s3 sync target/dx/app-shell/release/web/public $BUCKET
          aws cloudfront create-invalidation --distribution-id $CDN --paths "/*"

      # Build a Lambda deployment zip with `bootstrap` at the root plus the
      # SSR `public/` tree so the runtime can serve static assets alongside
      # server functions. CDK's `Code.fromAsset("<dir>")` will re-zip the
      # directory itself, but we also upload this zip as the CI artifact so
      # the deploy job (and anyone running `aws lambda update-function-code`
      # out-of-band) has a ready-to-push package.
      - name: Package lambda deployment zip
        run: |
          set -euo pipefail
          rm -rf .build/app-shell app-shell-lambda.zip
          mkdir -p .build/app-shell
          cp target/dx/app-shell/release/web/server .build/app-shell/bootstrap
          cp -r target/dx/app-shell/release/web/public .build/app-shell/public
          chmod +x .build/app-shell/bootstrap
          (cd .build/app-shell && zip -r ../../app-shell-lambda.zip . >/dev/null)
          unzip -l app-shell-lambda.zip | head -20

      - name: Upload lambda artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-shell-lambda-${{ github.sha }}
          path: ${{ github.workspace }}/app-shell-lambda.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload lambda bootstrap
        uses: actions/upload-artifact@v7
        with:
          name: app-shell-bootstrap-${{ github.sha }}
          path: ${{ github.workspace }}/.build/app-shell/bootstrap
          if-no-files-found: error
          retention-days: 7

  # Build a signed, prod-configured Android App Bundle and upload it to the
  # Google Play internal-testing track. Runs in parallel with the web/lambda
  # deploy (no `needs`). versionCode auto-increments via the run number, offset
  # by 1000 so it stays above any manually-uploaded builds (1001, 1002, ...).
  #
  # Required secrets (signing + publishing — add in repo settings):
  #   ANDROID_KEYSTORE_BASE64      base64 of the upload keystore
  #                                (`base64 -i ~/ratel-upload.jks | pbcopy`)
  #   ANDROID_KEYSTORE_PASSWORD    keystore (store) password
  #   ANDROID_KEY_ALIAS            key alias (e.g. "upload")
  #   ANDROID_KEY_ALIAS_PASSWORD   key password
  #   PLAY_SERVICE_ACCOUNT_JSON    Play Console service-account JSON (plain text),
  #                                granted "Release to testing tracks" access
  #   GOOGLE_OAUTH_CLIENT_ID       Web OAuth client id (register the Play/upload
  #                                signing SHA-1 in Google Cloud or sign-in fails)
  # Reuses existing PORTONE_* / FIREBASE_* prod secrets.
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          key: android-release-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            android-release-${{ runner.os }}-rust-
          path: |
            ~/.cargo/bin
            target
            app/ratel-tauri/dx-tauri-target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,aarch64-linux-android
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;29.0.14206865"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli + tauri-cli
        run: |
          # `--locked` pins dioxus-cli's published lockfile (git2 0.20); the
          # source-build fallback otherwise grabs git2 0.21 and breaks auth-git2.
          cargo binstall -y --locked dioxus-cli
          cargo binstall -y --locked --version "^2.0.0" tauri-cli

      - name: Write upload keystore + signing config
        working-directory: app/ratel-tauri/src-tauri/gen/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$(pwd)/upload-keystore.jks
          EOF

      - name: Build signed release AAB (prod)
        working-directory: app/ratel-tauri
        env:
          ENV: prod
          MOBILE_API_URL: https://ratel.foundation
          ANDROID_TARGET: aarch64-linux-android
          # versionCode is computed in the run script (GH Actions expressions
          # have no arithmetic): 1000 + run_number, to stay above manual uploads.
          ANDROID_VERSION_NAME: "1.0.${{ github.run_number }}"
          DYNAMO_TABLE_PREFIX: ratel-prod
          RUSTFLAGS: "-D warnings"
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_INICIS_CHANNEL_KEY: ${{ secrets.PROD_PORTONE_INICIS_CHANNEL_KEY }}
          PORTONE_KPN_CHANNEL_KEY: ${{ secrets.PORTONE_KPN_BILLING_KEY_CHANNEL_KEY }}
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          # app/ratel/Makefile's BUILD_ENV resolves AWS_ACCOUNT_ID via the AWS
          # CLI; the client build only needs these to be non-empty placeholders.
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: test
        run: |
          # setup-android exports ANDROID_HOME; point NDK_HOME at the version we
          # installed (Makefile's Linux default /opt/android-ndk doesn't exist here).
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/29.0.14206865"
          export NDK_HOME="$ANDROID_NDK_HOME"
          # Auto-increment versionCode (offset above manual uploads 1,2,3...).
          export ANDROID_VERSION_CODE=$(( 1000 + ${{ github.run_number }} ))
          echo "versionCode=$ANDROID_VERSION_CODE"
          # release-aab depends on dx-build (web bundle) + a signed AAB build.
          make release-aab
          echo "AAB:"
          find src-tauri/gen/android -name 'app-universal-release.aab' -print

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: co.biyard.ratel
          releaseFiles: app/ratel-tauri/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          track: internal
          status: completed

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: android-release-${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin
            target
            app/ratel-tauri/dx-tauri-target

  # ── iOS → TestFlight ────────────────────────────────────────────────
  # Mirrors android-release but for iOS. Builds a signed .ipa and uploads it
  # to App Store Connect / TestFlight via `make testflight` (altool + ASC API
  # key). CI has no access to your local Xcode/keychain, so signing material is
  # injected from secrets into a throwaway keychain on the runner.
  #
  # Required repo secrets (add in Settings → Secrets and variables → Actions):
  #   IOS_DIST_CERT_BASE64        base64 of the Apple Distribution .p12
  #                               (cert + private key). Export from Keychain
  #                               Access → "Apple Distribution: Biyard Corp."
  #                               (the one expiring 2027, SHA-1 BC325439…) →
  #                               Export → .p12. Then: base64 -i cert.p12 | pbcopy
  #   IOS_DIST_CERT_PASSWORD      the password set when exporting that .p12
  #   IOS_PROVISION_PROFILE_BASE64  base64 of the "Ratel Tauri AppStore"
  #                               App Store profile (.mobileprovision):
  #                               base64 -i "~/Library/MobileDevice/Provisioning Profiles/2c3cc49d-…​.mobileprovision" | pbcopy
  #   IOS_KEYCHAIN_PASSWORD       any string (temp keychain password)
  #   ASC_KEY_ID                  App Store Connect API Key ID
  #   ASC_ISSUER_ID               App Store Connect API Issuer ID
  #   ASC_API_KEY_BASE64          base64 of AuthKey_<ASC_KEY_ID>.p8:
  #                               base64 -i AuthKey_XXX.p8 | pbcopy
  # Reuses existing GOOGLE_OAUTH_CLIENT_ID / PORTONE_* / FIREBASE_* / PULL_KEY_REPO.
  # The signing identity SHA-1 + profile name are pinned in
  # app/ratel-tauri/src-tauri/gen/apple/project.yml (committed) — keep the
  # exported cert/profile matching those.
  ios-release:
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PULL_KEY_REPO }}

      # Apple now requires the iOS 26 SDK (Xcode 26+) for App Store uploads.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode / SDK
        run: xcodebuild -version && xcodebuild -showsdks | grep -i ios

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          key: ios-release-${{ runner.os }}-rust-ios18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ios-release-${{ runner.os }}-rust-ios18-
          path: |
            ~/.cargo/bin
            target
            app/ratel-tauri/dx-tauri-target

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,aarch64-apple-ios
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli + tauri-cli + xcodegen
        env:
          # Authenticated GitHub API: avoids the 403 rate-limit on binstall's
          # release-artifact lookup so it downloads the prebuilt dx/cargo-tauri
          # binaries (fast) instead of falling back to a slow source build.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # `command -v … ||` skips reinstall when the cache restored the binary
          # into ~/.cargo/bin — otherwise binstall's source fallback aborts with
          # "binary `dx` already exists in destination".
          command -v dx >/dev/null || cargo binstall -y --locked dioxus-cli
          command -v cargo-tauri >/dev/null || cargo binstall -y --locked --version "^2.0.0" tauri-cli
          # `make gen-xcodeproj` regenerates the pbxproj from project.yml.
          command -v xcodegen >/dev/null || brew install xcodegen

      - name: Ensure openssl@3 dylib for prebuilt dx
        run: |
          # The prebuilt `dx` from cargo-binstall is dynamically linked against
          # `/usr/local/opt/openssl@3/lib/libssl.3.dylib`. On the macos-15
          # (Apple Silicon) runner Homebrew lives at `/opt/homebrew`, and a
          # runner-image update left no openssl under `/usr/local`, so `dx`
          # aborts at launch with `dyld: Library not loaded` (Abort trap: 6)
          # before it can build. Install openssl@3 and symlink it to the exact
          # path the binary hard-codes. (libssl 3.x is ABI-stable, so the
          # current 3.x satisfies the `libssl.3.dylib` soname.)
          brew install openssl@3 || brew upgrade openssl@3 || true
          PREFIX="$(brew --prefix openssl@3)"
          sudo mkdir -p /usr/local/opt
          sudo ln -sfn "$PREFIX" /usr/local/opt/openssl@3
          test -f /usr/local/opt/openssl@3/lib/libssl.3.dylib
          # If the prebuilt `dx` still can't launch (e.g. it's x86_64 and the
          # symlinked openssl is arm64, an arch mismatch), rebuild dioxus-cli
          # from source so it links against THIS host's openssl. Slower, but
          # only runs when the fast path fails.
          if ! dx --version >/dev/null 2>&1; then
            echo "prebuilt dx failed to launch — rebuilding dioxus-cli from source"
            cargo install --locked --force dioxus-cli
          fi
          # Fail fast here (not 200 lines into the build) if dx still can't run.
          dx --version

      - name: Import signing certificate & provisioning profile
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          # Throwaway keychain, added to the search list so xcodebuild sees the cert.
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          mkdir -p "$PROFILES_DIR"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/ci-appstore.mobileprovision"

      - name: Write App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Build & upload to TestFlight (prod)
        working-directory: app/ratel-tauri
        env:
          ENV: prod
          MOBILE_API_URL: https://ratel.foundation
          DYNAMO_TABLE_PREFIX: ratel-prod
          RUSTFLAGS: "-D warnings"
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_INICIS_CHANNEL_KEY: ${{ secrets.PROD_PORTONE_INICIS_CHANNEL_KEY }}
          PORTONE_KPN_CHANNEL_KEY: ${{ secrets.PORTONE_KPN_BILLING_KEY_CHANNEL_KEY }}
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
